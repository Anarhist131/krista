<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Криста.Мессенджер 4.0</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon-192.png" />
    <meta name="theme-color" content="#b33a3a" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #0b0b0b;
            --surface: #14141e;
            --surface2: #1a1a2e;
            --surface3: #25253a;
            --text: #e0e0e0;
            --text2: #b0b0c0;
            --text3: #8888a0;
            --border: #2a2a3a;
            --accent: #b33a3a;
            --accent-light: #d44a4a;
            --accent-glow: rgba(179,58,58,0.15);
            --shadow: 0 8px 32px rgba(0,0,0,0.6);
            --radius: 4px;
            --radius-sm: 2px;
            --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            --transition: 0.2s ease;
        }
        .theme-light {
            --bg: #e8e8ec;
            --surface: #f2f2f5;
            --surface2: #e0e0e4;
            --surface3: #d0d0d4;
            --text: #1a1a1a;
            --text2: #444455;
            --text3: #666677;
            --border: #b0b0c0;
            --shadow: 0 8px 32px rgba(0,0,0,0.12);
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background var(--transition), color var(--transition);
            user-select: none;
            -webkit-user-select: none;
        }
        .app {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            min-height: 400px;
            background: var(--surface);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            transition: background-image 0.3s ease;
            background-size: cover;
            background-position: center;
        }
        @media (max-width:480px) {
            .app { border-radius:0; height:100vh; min-height:100vh; border:none; }
        }

        /* ===== ШАПКА ===== */
        .header {
            padding: 8px 12px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .header .logo {
            font-size:18px;
            font-weight:700;
            color:var(--accent);
        }
        .header .settings-btn {
            background:var(--surface3);
            border:1px solid var(--border);
            color:var(--text3);
            padding:3px 12px;
            font-size:13px;
            cursor:pointer;
            font-family:inherit;
            border-radius:var(--radius-sm);
        }
        .header .settings-btn:hover { background:var(--border); }

        /* ===== ПОИСК + СОЗДАНИЕ ===== */
        .search-row {
            display:flex;
            gap:6px;
            padding:6px 12px 8px;
            background:var(--surface);
            border-bottom:1px solid var(--border);
            flex-shrink:0;
            align-items:center;
        }
        .search-row input {
            flex:1;
            background:var(--surface3);
            border:1px solid var(--border);
            border-radius:var(--radius-sm);
            padding:6px 10px;
            font-size:13px;
            color:var(--text);
            outline:none;
            font-family:inherit;
        }
        .search-row input:focus { border-color:var(--accent); }
        .search-row input::placeholder { color:var(--text3); }
        .search-row .create-btn {
            background:var(--accent);
            border:none;
            color:#fff;
            padding:4px 10px;
            font-size:18px;
            font-weight:700;
            border-radius:var(--radius-sm);
            cursor:pointer;
            line-height:1;
            font-family:inherit;
            flex-shrink:0;
        }

        /* ===== СПИСОК ЧАТОВ ===== */
        .chat-list {
            flex:1;
            overflow-y:auto;
            padding:4px 6px;
            display:flex;
            flex-direction:column;
            gap:0;
            background:var(--surface);
        }
        .chat-item {
            display:flex;
            align-items:center;
            padding:8px 10px;
            border-radius:var(--radius-sm);
            cursor:pointer;
            gap:10px;
            border-bottom:1px solid var(--border);
            flex-shrink:0;
            transition:background 0.15s;
            position:relative;
        }
        .chat-item:hover { background:var(--surface2); }
        .chat-item.pinned {
            background:var(--surface3);
            border-left:3px solid var(--accent);
        }
        .chat-item .avatar-wrapper {
            position:relative;
            flex-shrink:0;
        }
        .chat-item .avatar {
            width:38px;
            height:38px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:14px;
            font-weight:700;
            color:#fff;
            background:var(--accent);
            border:1px solid var(--border);
        }
        .chat-item .status-dot {
            position:absolute;
            bottom:-2px;
            right:-2px;
            width:12px;
            height:12px;
            border-radius:50%;
            border:2px solid var(--surface);
            background:#555;
            transition:background 0.3s;
        }
        .chat-item .status-dot.online { background:#ffd700; }
        .chat-item .info {
            flex:1;
            min-width:0;
            display:flex;
            flex-direction:column;
            gap:1px;
        }
        .chat-item .info .name {
            font-weight:600;
            font-size:14px;
            display:flex;
            align-items:center;
            gap:4px;
            color:var(--text);
            flex-wrap:wrap;
        }
        .chat-item .info .name .accent { color:var(--accent); }
        .chat-item .info .name .chat-uin {
            font-size:10px;
            color:var(--text3);
            font-weight:400;
            margin-left:4px;
        }
        .chat-item .info .last {
            font-size:12px;
            color:var(--text3);
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .chat-item .badge {
            background:var(--accent);
            color:#fff;
            font-size:10px;
            padding:0 6px;
            border-radius:10px;
            flex-shrink:0;
            margin-left:auto;
            min-width:16px;
            text-align:center;
        }
        .chat-empty {
            color:var(--text3);
            text-align:center;
            padding:40px 20px;
            font-size:14px;
        }

        /* ===== ДЕТАЛЬНЫЙ ЧАТ ===== */
        .chat-detail {
            display:none;
            flex:1;
            flex-direction:column;
            background:var(--surface);
            overflow:hidden;
            position:absolute;
            inset:0;
            z-index:20;
            border-radius:var(--radius);
            background-size:cover;
            background-position:center;
        }
        .chat-detail.active { display:flex; }
        .detail-header {
            display:flex;
            align-items:center;
            padding:8px 12px;
            background:var(--surface2);
            border-bottom:1px solid var(--border);
            flex-shrink:0;
            gap:8px;
        }
        .detail-header .back {
            background:none;
            border:none;
            color:var(--accent);
            font-size:22px;
            cursor:pointer;
            padding:0 2px;
            font-family:inherit;
        }
        .detail-header .title {
            font-weight:600;
            font-size:16px;
            display:flex;
            align-items:center;
            gap:6px;
            color:var(--text);
            flex-wrap:wrap;
        }
        .detail-header .title .accent { color:var(--accent); }
        .detail-header .title .chat-uin {
            font-size:11px;
            color:var(--text3);
            font-weight:400;
            margin-left:4px;
        }
        .detail-header .avatar-wrapper {
            position:relative;
            flex-shrink:0;
        }
        .detail-header .avatar {
            width:28px;
            height:28px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:12px;
            font-weight:700;
            color:#fff;
            background:var(--accent);
            border:1px solid var(--border);
        }
        .detail-header .status-dot {
            position:absolute;
            bottom:-2px;
            right:-2px;
            width:10px;
            height:10px;
            border-radius:50%;
            border:2px solid var(--surface2);
            background:#555;
            transition:background 0.3s;
        }
        .detail-header .status-dot.online { background:#ffd700; }
        .detail-header .status-text {
            font-size:11px;
            color:var(--text3);
            margin-left:auto;
        }

        .messages {
            flex:1;
            padding:8px 12px;
            overflow-y:auto;
            display:flex;
            flex-direction:column;
            gap:4px;
            background:rgba(0,0,0,0.3);
        }
        .msg-block {
            background:var(--surface2);
            padding:6px 10px;
            border-radius:var(--radius-sm);
            border:1px solid var(--border);
        }
        .msg-block .date {
            font-size:10px;
            color:var(--text3);
            border-bottom:1px solid var(--border);
            padding-bottom:3px;
            margin-bottom:4px;
            font-weight:600;
        }
        .msg-block .msg {
            font-size:13px;
            line-height:1.5;
            padding:2px 0;
            position:relative;
            color:var(--text);
            word-wrap:break-word;
            overflow-wrap:break-word;
        }
        .msg-block .msg .msg-sender-uin { color:var(--accent); font-weight:600; }
        .msg-block .msg .msg-time { color:var(--text3); font-size:11px; margin:0 4px; }
        .msg-block .msg .msg-sender-name { color:var(--accent); font-weight:600; }
        .msg-block .msg .msg-text { margin-left:4px; color:var(--text); }
        .msg-block .msg.pinned-msg {
            background:var(--accent-glow);
            border-left:3px solid var(--accent);
            padding-left:6px;
            margin-bottom:2px;
            border-radius:var(--radius-sm);
        }
        .msg-block .msg .pin-icon {
            font-size:10px;
            color:var(--accent);
            margin-right:4px;
        }

        /* Контекстное меню */
        .context-menu {
            display:none;
            position:fixed;
            background:var(--surface2);
            border:1px solid var(--border);
            border-radius:var(--radius-sm);
            box-shadow:var(--shadow);
            padding:6px 0;
            min-width:140px;
            z-index:100;
            flex-direction:column;
        }
        .context-menu.active { display:flex; }
        .context-menu button {
            background:none;
            border:none;
            padding:6px 16px;
            text-align:left;
            color:var(--text);
            font-size:13px;
            cursor:pointer;
            font-family:inherit;
            width:100%;
            transition:background 0.1s;
        }
        .context-menu button:hover { background:var(--surface3); }
        .context-menu .danger { color:#d44a4a; }
        .context-menu .divider {
            height:1px;
            background:var(--border);
            margin:4px 8px;
        }

        .input-area {
            display:flex;
            align-items:center;
            gap:6px;
            padding:6px 10px;
            background:var(--surface2);
            border-top:1px solid var(--border);
            flex-shrink:0;
        }
        .input-area input[type="text"] {
            flex:1;
            background:var(--surface3);
            border:1px solid var(--border);
            border-radius:var(--radius-sm);
            padding:6px 10px;
            color:var(--text);
            font-size:13px;
            outline:none;
            font-family:inherit;
            min-height:34px;
        }
        .input-area input:focus { border-color:var(--accent); }
        .input-area .send {
            background:var(--accent);
            border:none;
            border-radius:var(--radius-sm);
            padding:6px 12px;
            font-size:16px;
            color:#fff;
            cursor:pointer;
            font-family:inherit;
        }

        /* ===== МОДАЛЬНЫЕ ОКНА ===== */
        .modal-overlay {
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.6);
            backdrop-filter:blur(8px);
            align-items:center;
            justify-content:center;
            z-index:999;
            padding:20px;
        }
        .modal-overlay.active { display:flex; }
        .modal-box {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:var(--radius);
            padding:20px;
            max-width:380px;
            width:100%;
            max-height:90vh;
            overflow-y:auto;
            box-shadow:var(--shadow);
            position:relative;
        }
        .modal-box h3 {
            color:var(--text);
            margin-bottom:10px;
            font-size:17px;
        }
        .modal-box input, .modal-box select {
            width:100%;
            background:var(--surface3);
            border:1px solid var(--border);
            border-radius:var(--radius-sm);
            padding:8px 10px;
            color:var(--text);
            font-size:13px;
            margin-bottom:8px;
            font-family:inherit;
            outline:none;
        }
        .modal-box input:focus, .modal-box select:focus { border-color:var(--accent); }
        .modal-box .btn-row {
            display:flex;
            gap:8px;
            justify-content:flex-end;
            margin-top:6px;
        }
        .modal-box .btn-row button {
            padding:5px 14px;
            border-radius:var(--radius-sm);
            border:1px solid var(--border);
            background:var(--surface2);
            color:var(--text);
            cursor:pointer;
            font-family:inherit;
            font-size:13px;
        }
        .modal-box .btn-row .primary {
            background:var(--accent);
            border-color:var(--accent);
            color:#fff;
        }
        .modal-box .btn-row .danger {
            background:#b33a3a;
            border-color:#b33a3a;
            color:#fff;
        }
        .modal-box .error {
            color:#d44a4a;
            font-size:12px;
            margin-bottom:8px;
            display:none;
        }
        .modal-box .close-btn {
            position:absolute;
            top:10px;
            right:15px;
            font-size:24px;
            background:none;
            border:none;
            color:var(--text3);
            cursor:pointer;
            font-family:inherit;
        }
        .modal-box .close-btn:hover { color:var(--text); }
        .modal-box .settings-row {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:5px 0;
            border-bottom:1px solid var(--border);
        }
        .modal-box .settings-row .label { color:var(--text2); font-size:13px; }
        .modal-box .settings-row .value {
            display:flex;
            align-items:center;
            gap:6px;
            flex-wrap:wrap;
        }
        .modal-box .settings-row .value .chip {
            background:var(--surface3);
            padding:1px 8px;
            border-radius:10px;
            font-size:11px;
            color:var(--text3);
            border:1px solid var(--border);
            cursor:pointer;
            transition:background 0.2s;
        }
        .modal-box .settings-row .value .chip:hover { background:var(--border); }
        .modal-box .settings-row .value button {
            background:var(--surface3);
            color:var(--text);
            border:1px solid var(--border);
            border-radius:var(--radius-sm);
            padding:2px 10px;
            font-size:12px;
            cursor:pointer;
            font-family:inherit;
        }
        .modal-box .settings-row .value button:hover { background:var(--border); }
        .modal-box .settings-row .value input[type="text"] {
            width:140px;
            margin:0;
        }
        .modal-box .theme-dot {
            width:30px;
            height:30px;
            border-radius:50%;
            border:2px solid var(--border);
            cursor:pointer;
            padding:0;
            transition:transform 0.2s, border-color 0.2s;
        }
        .modal-box .theme-dot:hover { transform:scale(1.1); }
        .modal-box .theme-dot.active {
            border-color:var(--accent);
            box-shadow:0 0 8px var(--accent-glow);
        }
        .modal-box .account-item {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:4px 0;
            border-bottom:1px solid var(--border);
        }
        .modal-box .account-item .account-info {
            display:flex;
            flex-direction:column;
            gap:2px;
        }
        .modal-box .account-item .account-info .acc-username {
            font-weight:600;
            color:var(--text);
        }
        .modal-box .account-item .account-info .acc-uin {
            font-size:11px;
            color:var(--text3);
        }
        .modal-box .account-item .acc-switch-btn {
            background:var(--surface3);
            border:1px solid var(--border);
            color:var(--text);
            padding:2px 10px;
            font-size:11px;
            cursor:pointer;
            font-family:inherit;
            border-radius:var(--radius-sm);
        }
        .modal-box .account-item .acc-switch-btn:hover { background:var(--border); }

        .color-option {
            width:24px;
            height:24px;
            border-radius:50%;
            border:2px solid var(--border);
            cursor:pointer;
            padding:0;
            transition:transform 0.2s, border-color 0.2s;
        }
        .color-option:hover { transform:scale(1.1); }
        .color-option.active {
            border-color:var(--accent);
            box-shadow:0 0 8px var(--accent-glow);
        }

        /* ===== СКРОЛЛ ===== */
        .chat-list::-webkit-scrollbar,
        .messages::-webkit-scrollbar,
        .modal-box::-webkit-scrollbar {
            width:4px;
        }
        .chat-list::-webkit-scrollbar-thumb,
        .messages::-webkit-scrollbar-thumb,
        .modal-box::-webkit-scrollbar-thumb {
            background:var(--border);
            border-radius:2px;
        }

        @keyframes fadeSlide {
            from { opacity:0; transform:translateY(4px); }
            to { opacity:1; transform:translateY(0); }
        }
        .chat-item { animation:fadeSlide 0.2s ease both; }
    </style>
</head>
<body>

<div class="app" id="app">
    <!-- ШАПКА -->
    <div class="header">
        <div class="logo">К.Мессенджер</div>
        <button class="settings-btn" id="settingsOpenBtn">⚙️ Настройки</button>
    </div>

    <!-- ПОИСК + СОЗДАНИЕ -->
    <div class="search-row">
        <input type="text" id="searchInput" placeholder="🔍 Поиск по UIN или имени..." autocomplete="off" />
        <button class="create-btn" id="createChatBtn">✚</button>
    </div>

    <!-- СПИСОК ЧАТОВ -->
    <div class="chat-list" id="chatList">
        <div class="chat-empty">Загрузка чатов...</div>
    </div>

    <!-- ДЕТАЛЬНЫЙ ЧАТ -->
    <div class="chat-detail" id="chatDetail">
        <div class="detail-header">
            <button class="back" id="backToChats">‹</button>
            <div class="avatar-wrapper">
                <div class="avatar" id="detailAvatar">Ч</div>
                <div class="status-dot" id="detailStatusDot"></div>
            </div>
            <div class="title">
                Чат: <span class="accent" id="detailTitle">Название</span>
                <span class="chat-uin" id="detailChatUin"></span>
            </div>
            <span class="status-text" id="detailStatusText"></span>
        </div>
        <div class="messages" id="detailMessages"><div class="chat-empty">Нет сообщений</div></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Введите сообщение..." autocomplete="off" />
            <button class="send" id="sendBtn">✈</button>
        </div>
    </div>
</div>

<!-- ===== МОДАЛКА ВХОДА ===== -->
<div class="modal-overlay" id="loginModal">
    <div class="modal-box">
        <h3>🔐 Вход / Регистрация</h3>
        <div class="error" id="loginError"></div>
        <input type="text" id="loginUinOrName" placeholder="UIN (при входе) или имя (при регистрации)" autocomplete="off" />
        <input type="password" id="loginPassword" placeholder="Пароль" />
        <div style="display:flex; gap:6px; margin-bottom:8px;">
            <button id="loginBtn" style="flex:1; background:var(--surface3); border:1px solid var(--border); border-radius:var(--radius-sm); padding:5px; color:var(--text); cursor:pointer; font-family:inherit;">Вход</button>
            <button id="registerBtn" style="flex:1; background:var(--accent); border:none; border-radius:var(--radius-sm); padding:5px; color:#fff; cursor:pointer; font-family:inherit;">Регистрация</button>
        </div>
        <div class="btn-row">
            <button id="loginCloseBtn">Закрыть</button>
        </div>
    </div>
</div>

<!-- ===== МОДАЛКА СОЗДАНИЯ ЧАТА ===== -->
<div class="modal-overlay" id="createChatModal">
    <div class="modal-box">
        <h3>✚ Создать чат</h3>
        <select id="chatTypeSelect">
            <option value="group">Группа</option>
            <option value="channel">Канал</option>
        </select>
        <input type="text" id="chatNameInput" placeholder="Название чата" autocomplete="off" />
        <div style="display:flex; gap:6px; margin:6px 0; align-items:center; flex-wrap:wrap;">
            <span style="font-size:12px; color:var(--text2);">Цвет:</span>
            <button class="color-option active" data-color="default" style="background:#b33a3a;"></button>
            <button class="color-option" data-color="green" style="background:#3a8f3a;"></button>
            <button class="color-option" data-color="light" style="background:#e0e0e4; border-color:#666;"></button>
            <button class="color-option" data-color="blue" style="background:#2a6ad9;"></button>
            <button class="color-option" data-color="pink" style="background:#d94a7a;"></button>
            <button class="color-option" data-color="bw" style="background:#888;"></button>
        </div>
        <input type="text" id="chatBgInput" placeholder="URL фона (опционально)" autocomplete="off" />
        <div class="btn-row">
            <button id="createChatCloseBtn">Отмена</button>
            <button class="primary" id="createChatConfirmBtn">Создать</button>
        </div>
    </div>
</div>

<!-- ===== МОДАЛКА НАСТРОЕК ===== -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal-box">
        <button class="close-btn" id="settingsCloseBtn">✕</button>
        <h3>⚙️ Настройки</h3>

                <button id="deleteAccountBtn" class="danger" style="background:#b33a3a; border:1px solid #b33a3a; color:#fff; padding:2px 10px; font-size:12px; cursor:pointer; font-family:inherit; border-radius:var(--radius-sm);">🗑️ Удалить этот аккаунт</button>

        <!-- О мессенджере -->

            <strong style="color:var(--text);">Криста.Мессенджер</strong> v4.0<br>
            Разработчики: <span style="color:var(--accent);">ЛесГем</span>, Кiль, Кухарев Егор<br>
            <span style="font-size:11px;">© 17 Июля 2026</span>
        </div>
    </div>
</div>

<!-- КОНТЕКСТНОЕ МЕНЮ ДЛЯ ЧАТОВ -->
<div class="context-menu" id="chatContextMenu">
    <button data-action="pin">📌 Закрепить</button>
    <button data-action="unpin">📌 Открепить</button>
    <button data-action="copy-id">📋 Скопировать ID</button>
    <button class="danger" data-action="delete">🗑️ Удалить чат</button>
</div>

<!-- КОНТЕКСТНОЕ МЕНЮ ДЛЯ СООБЩЕНИЙ -->
<div class="context-menu" id="contextMenu">
    <button data-action="copy">📋 Копировать</button>
    <button data-action="delete-self">🗑️ Удалить у себя</button>
    <button class="danger" data-action="delete-for-all">💣 Удалить для всех</button>
</div>

<script>
// ============================================================
// КРИСТА.МЕССЕНДЖЕР 4.0 — ПОЛНАЯ ВЕРСИЯ
// ============================================================

const WS_URL = `${window.location.protocol === 'https:' ? 'wss://' : 'ws://'}${window.location.host}`;
const API_BASE = '';
let token = localStorage.getItem('krista_token');
let currentUser = null;
let ws = null;
let chats = [];
let currentChatId = null;
let messages = {};
let pinnedChats = [];
let onlineUsers = {};
let globalBackground = '';

// ---- DOM ----
const appEl = document.getElementById('app');
const loginModal = document.getElementById('loginModal');
const loginCloseBtn = document.getElementById('loginCloseBtn');
const loginUinOrName = document.getElementById('loginUinOrName');
const loginPassword = document.getElementById('loginPassword');
const loginBtn = document.getElementById('loginBtn');
const registerBtn = document.getElementById('registerBtn');
const loginError = document.getElementById('loginError');

const chatList = document.getElementById('chatList');
const detail = document.getElementById('chatDetail');
const detailTitle = document.getElementById('detailTitle');
const detailChatUin = document.getElementById('detailChatUin');
const detailAvatar = document.getElementById('detailAvatar');
const detailStatusDot = document.getElementById('detailStatusDot');
const detailStatusText = document.getElementById('detailStatusText');
const detailMessages = document.getElementById('detailMessages');
const backBtn = document.getElementById('backToChats');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

const searchInput = document.getElementById('searchInput');
const createChatBtn = document.getElementById('createChatBtn');

const settingsOpenBtn = document.getElementById('settingsOpenBtn');
const settingsModal = document.getElementById('settingsModal');
const settingsCloseBtn = document.getElementById('settingsCloseBtn');
const settingsUin = document.getElementById('settingsUin');
const copyUinBtn = document.getElementById('copyUinBtn');
const settingsUsernameInput = document.getElementById('settingsUsernameInput');
const saveUsernameBtn = document.getElementById('saveUsernameBtn');
const settingsBgInput = document.getElementById('settingsBgInput');
const saveBgBtn = document.getElementById('saveBgBtn');
const logoutBtn = document.getElementById('logoutBtn');
const accountsList = document.getElementById('accountsList');
const addAccountBtn = document.getElementById('addAccountBtn');
const deleteAccountBtn = document.getElementById('deleteAccountBtn');

const themeDots = document.querySelectorAll('.theme-dot');

const createChatModal = document.getElementById('createChatModal');
const chatTypeSelect = document.getElementById('chatTypeSelect');
const chatNameInput = document.getElementById('chatNameInput');
const chatBgInput = document.getElementById('chatBgInput');
const createChatCloseBtn = document.getElementById('createChatCloseBtn');
const createChatConfirmBtn = document.getElementById('createChatConfirmBtn');

const chatContextMenu = document.getElementById('chatContextMenu');
const contextMenu = document.getElementById('contextMenu');
let activeChatElement = null;
let activeMsgElement = null;
let selectedColor = 'default';

// ---- Сохранённые аккаунты ----
let savedAccounts = JSON.parse(localStorage.getItem('krista_accounts') || '[]');
let currentAccountIndex = parseInt(localStorage.getItem('krista_current_account')) || 0;

// ---- Вспомогательные ----
function showError(msg) { loginError.textContent=msg; loginError.style.display='block'; }
function hideError() { loginError.style.display='none'; }
function formatDate(iso) {
    const d=new Date(iso);
    return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function formatTime(iso) {
    const d=new Date(iso);
    return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}
function getInitials(name){ return name.charAt(0).toUpperCase(); }
function getAvatarColor(){ return getComputedStyle(appEl).getPropertyValue('--accent').trim() || '#b33a3a'; }
function scrollToBottom(el){ el.scrollTop=el.scrollHeight; }

// ---- API ----
async function apiRequest(url, options={}) {
    const headers={'Content-Type':'application/json',...options.headers};
    if (token) headers.Authorization=`Bearer ${token}`;
    const res=await fetch(`${API_BASE}${url}`,{...options,headers});
    const data=await res.json();
    if (!res.ok) throw new Error(data.error||'Ошибка');
    return data;
}

// ---- Авторизация ----
async function login(uin, password) {
    try {
        const data=await apiRequest('/api/login',{method:'POST',body:JSON.stringify({uin,password})});
        if (data.success) {
            token=data.token;
            localStorage.setItem('krista_token', token);
            currentUser={uin:data.uin, username:data.username};
            afterLogin();
            hideError();
            loginModal.classList.remove('active');
        } else showError(data.message||'Ошибка входа');
    } catch(e){ showError(e.message); }
}

async function register(username, password) {
    try {
        const data=await apiRequest('/api/register',{method:'POST',body:JSON.stringify({username,password})});
        if (data.success) {
            token=data.token;
            localStorage.setItem('krista_token', token);
            currentUser={uin:data.uin, username:data.username};
            afterLogin();
            hideError();
            loginModal.classList.remove('active');
        } else showError(data.message||'Ошибка регистрации');
    } catch(e){ showError(e.message); }
}

function logout() {
    token=null;
    localStorage.removeItem('krista_token');
    currentUser=null;
    if(ws){ws.close(); ws=null;}
    chats=[]; messages={}; currentChatId=null; onlineUsers={};
    detail.classList.remove('active');
    renderChatList();
    settingsModal.classList.remove('active');
    loginModal.classList.add('active');
}

function afterLogin() {
    loadUserData();
    connectWebSocket();
    loadChats();
}

async function loadUserData() {
    try {
        const data=await apiRequest('/api/me');
        if (data) {
            currentUser={...currentUser,...data};
            if (data.theme) {
                applyTheme(data.theme);
                themeDots.forEach(d=>{
                    d.classList.toggle('active', d.dataset.theme===data.theme);
                });
            }
            if (data.pinnedChats) pinnedChats=data.pinnedChats;
            if (data.background) {
                globalBackground = data.background;
                applyGlobalBackground();
            }
            updateUI();
        }
    } catch(e){ console.error('Ошибка загрузки профиля:',e); }
}

function updateUI(){ renderChatList(); }

function applyGlobalBackground() {
    if (globalBackground) {
        appEl.style.backgroundImage = `url(${globalBackground})`;
    } else {
        appEl.style.backgroundImage = '';
    }
}

// ---- WebSocket ----
function connectWebSocket() {
    if(ws) return;
    ws=new WebSocket(WS_URL);
    ws.onopen=()=>{ ws.send(JSON.stringify({type:'auth',payload:{token}})); };
    ws.onmessage=(e)=>{
        try{ handleWebSocketMessage(JSON.parse(e.data)); }
        catch(err){ console.error('WS ошибка:',err); }
    };
    ws.onclose=()=>{ ws=null; setTimeout(connectWebSocket,5000); };
    ws.onerror=(err)=>console.error('WS ошибка:',err);
}
function handleWebSocketMessage(data) {
    const {type,payload}=data;
    switch(type){
        case 'newMessage':
            if (messages[payload.chatId] && messages[payload.chatId].some(m => m.id === payload.id)) break;
            handleNewMessage(payload);
            break;
        case 'deleteMessage': handleDeleteMessage(payload); break;
        case 'status': handleStatus(payload); break;
        case 'newChat': handleNewChat(payload); break;
        case 'chatDeleted': handleChatDeleted(payload); break;
        default: console.log('Неизвестный тип WS:',type);
    }
}
function handleNewMessage(msg) {
    if(!messages[msg.chatId]) messages[msg.chatId]=[];
    if (messages[msg.chatId].some(m => m.id === msg.id)) return;
    messages[msg.chatId].push(msg);
    if(currentChatId===msg.chatId) renderMessages(currentChatId);
    loadChats();
}
function handleDeleteMessage(payload) {
    const chatId=payload.chatId;
    if(messages[chatId]){
        const idx=messages[chatId].findIndex(m=>m.id===payload.messageId);
        if(idx>-1) messages[chatId][idx].deleted=true;
        if(currentChatId===chatId) renderMessages(chatId);
    }
    loadChats();
}
function handleStatus(payload) {
    onlineUsers[payload.uin] = payload.status === 'online';
    renderChatList();
    if (currentChatId) {
        const chat = chats.find(c => c.id === currentChatId);
        if (chat && chat.members.includes(payload.uin)) {
            updateDetailStatus(payload.uin);
        }
    }
}
function handleNewChat(chat){ chats.push(chat); renderChatList(); }
function handleChatDeleted(payload){
    chats=chats.filter(c=>c.id!==payload.chatId);
    if(currentChatId===payload.chatId){ detail.classList.remove('active'); currentChatId=null; }
    renderChatList();
}

function updateDetailStatus(uin) {
    const isOnline = onlineUsers[uin] || false;
    detailStatusDot.className = 'status-dot' + (isOnline ? ' online' : '');
    detailStatusText.textContent = isOnline ? '🟢 в сети' : '🔴 не в сети';
}

// ---- Загрузка данных ----
async function loadChats() {
    try { const data=await apiRequest('/api/chats'); chats=data; renderChatList(); }
    catch(err){ console.error('Ошибка загрузки чатов:',err); }
}
async function loadMessages(chatId) {
    try {
        const data=await apiRequest(`/api/chats/${chatId}/messages`);
        messages[chatId]=data;
        renderMessages(chatId);
    } catch(err) {
        console.error('Ошибка сообщений:',err);
        detailMessages.innerHTML='<div class="chat-empty">Ошибка загрузки сообщений</div>';
    }
}

// ---- Рендеринг ----
function renderChatList() {
    if(!chats || chats.length===0){
        chatList.innerHTML='<div class="chat-empty">Нет чатов. Создайте первый!</div>';
        return;
    }
    const pinned=chats.filter(c=>pinnedChats.includes(c.id));
    const unpinned=chats.filter(c=>!pinnedChats.includes(c.id));
    const sorted=[...pinned,...unpinned].sort((a,b)=>{
        if(pinnedChats.includes(a.id)&&!pinnedChats.includes(b.id)) return -1;
        if(!pinnedChats.includes(a.id)&&pinnedChats.includes(b.id)) return 1;
        return new Date(b.updatedAt)-new Date(a.updatedAt);
    });
    let html='';
    sorted.forEach(chat=>{
        const isPinned=pinnedChats.includes(chat.id);
        const lastMsg=chat.lastMessage;
        let lastText='Нет сообщений';
        if (lastMsg) {
            const senderName = lastMsg.senderName || lastMsg.sender;
            lastText = `${lastMsg.sender} [${formatTime(lastMsg.timestamp)}] ${senderName}: ${lastMsg.text}`;
        }
        const badge=chat.unreadCount>0?`<span class="badge">${chat.unreadCount}</span>`:'';
        const avatar=getInitials(chat.name);
        const color=chat.colorScheme!=='default'?getAvatarColor():'#b33a3a';
        const isOnline = chat.members.some(m => onlineUsers[m] === true);
        html+=`
            <div class="chat-item ${isPinned?'pinned':''}" data-chat-id="${chat.id}">
                <div class="avatar-wrapper">
                    <div class="avatar" style="background:${color};">${avatar}</div>
                    <div class="status-dot ${isOnline?'online':''}"></div>
                </div>
                <div class="info">
                    <div class="name">
                        <span class="accent">${chat.name}</span>
                        <span class="chat-uin">(${chat.id})</span>
                        ${isPinned?'📌':''}
                    </div>
                    <div class="last">${lastText}</div>
                </div>
                ${badge}
            </div>
        `;
    });
    chatList.innerHTML=html;
    chatList.querySelectorAll('.chat-item').forEach(el=>{
        el.addEventListener('click',function(){ openChat(this.dataset.chatId); });
        el.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            activeChatElement = this;
            const chatId = this.dataset.chatId;
            const isPinned = pinnedChats.includes(chatId);
            chatContextMenu.querySelector('[data-action="pin"]').style.display = isPinned ? 'none' : 'block';
            chatContextMenu.querySelector('[data-action="unpin"]').style.display = isPinned ? 'block' : 'none';
            chatContextMenu.style.left = Math.min(e.clientX, window.innerWidth - 150) + 'px';
            chatContextMenu.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
            chatContextMenu.classList.add('active');
        });
        let longPressTimer;
        el.addEventListener('touchstart', function(e) {
            longPressTimer = setTimeout(() => {
                const ev = new Event('contextmenu');
                ev.clientX = e.touches[0].clientX;
                ev.clientY = e.touches[0].clientY;
                el.dispatchEvent(ev);
            }, 600);
        });
        el.addEventListener('touchend', function() { clearTimeout(longPressTimer); });
        el.addEventListener('touchmove', function() { clearTimeout(longPressTimer); });
    });
}

function openChat(chatId) {
    currentChatId=chatId;
    const chat=chats.find(c=>c.id===chatId);
    if(!chat) return;
    detailTitle.textContent=chat.name;
    detailChatUin.textContent = `(${chat.id})`;
    detailAvatar.textContent=getInitials(chat.name);
    const color=chat.colorScheme!=='default'?getAvatarColor():'#b33a3a';
    detailAvatar.style.background=color;
    // Применяем фон чата или глобальный
    if (chat.background) {
        detail.style.backgroundImage = `url(${chat.background})`;
    } else if (globalBackground) {
        detail.style.backgroundImage = `url(${globalBackground})`;
    } else {
        detail.style.backgroundImage = '';
    }
    const firstMember = chat.members.find(m => m !== currentUser.uin);
    if (firstMember) {
        updateDetailStatus(firstMember);
    } else {
        detailStatusDot.className = 'status-dot';
        detailStatusText.textContent = '';
    }
    if(messages[chatId]) renderMessages(chatId);
    else loadMessages(chatId);
    detail.classList.add('active');
    setTimeout(()=>msgInput.focus(),300);
}

function renderMessages(chatId) {
    const msgs=messages[chatId]||[];
    if(msgs.length===0){ detailMessages.innerHTML='<div class="chat-empty">Нет сообщений</div>'; return; }
    const pinnedMsgs=msgs.filter(m=>m.isPinned&&!m.deleted);
    const normalMsgs=msgs.filter(m=>!m.isPinned&&!m.deleted);
    let html='';
    if(pinnedMsgs.length>0){
        html+=`<div class="msg-block"><div class="date">📌 ЗАКРЕПЛЁННЫЕ</div>`;
        pinnedMsgs.forEach(msg=>{ html+=buildMessageHtml(msg,true); });
        html+=`</div>`;
    }
    const groups={};
    normalMsgs.forEach(msg=>{
        const date=formatDate(msg.timestamp);
        if(!groups[date]) groups[date]=[];
        groups[date].push(msg);
    });
    for(const [date, msgsGroup] of Object.entries(groups)){
        html+=`<div class="msg-block"><div class="date">====== ${date} ======</div>`;
        msgsGroup.forEach(msg=>{ html+=buildMessageHtml(msg,false); });
        html+=`</div>`;
    }
    detailMessages.innerHTML=html;
    scrollToBottom(detailMessages);
}

function buildMessageHtml(msg,isPinned){
    const pinClass=isPinned?'pinned-msg':'';
    const pinIcon=isPinned?'<span class="pin-icon">📌</span>':'';
    const senderName = msg.senderName || msg.sender;
    return `
        <div class="msg ${pinClass}" data-msg-id="${msg.id}">
            ${pinIcon}
            <span class="msg-sender-uin">${msg.sender}</span>
            <span class="msg-time">[${formatTime(msg.timestamp)}]</span>
            <span class="msg-sender-name">${senderName}:</span>
            <span class="msg-text">${msg.text}</span>
        </div>
    `;
}

// ---- Отправка сообщений ----
function sendMessage() {
    const text=msgInput.value.trim();
    if(!text||!currentChatId||!ws) return;
    ws.send(JSON.stringify({type:'newMessage',payload:{chatId:currentChatId,text,sender:currentUser.uin}}));
    msgInput.value='';
    msgInput.focus();
}

// ---- Контекстное меню сообщений ----
document.addEventListener('contextmenu', function(e) {
    const msgElement = e.target.closest('.msg');
    if (msgElement && msgElement.closest('.messages')) {
        e.preventDefault();
        activeMsgElement = msgElement;
        contextMenu.style.left = Math.min(e.clientX, window.innerWidth - 150) + 'px';
        contextMenu.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
        contextMenu.classList.add('active');
    } else contextMenu.classList.remove('active');
});
document.addEventListener('click', () => {
    contextMenu.classList.remove('active');
    chatContextMenu.classList.remove('active');
});
contextMenu.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const action = this.dataset.action;
        if (!activeMsgElement) return;
        const msgText = activeMsgElement.querySelector('.msg-text')?.textContent || '';
        const msgId = activeMsgElement.dataset.msgId || '';
        let msgObj = null;
        if (currentChatId && messages[currentChatId]) {
            msgObj = messages[currentChatId].find(m => m.id === msgId);
        }
        switch(action) {
            case 'copy':
                navigator.clipboard?.writeText(msgText).then(() => alert('📋 Текст скопирован'));
                break;
            case 'delete-self':
                if (confirm('Удалить это сообщение только у себя?') && msgObj && ws) {
                    ws.send(JSON.stringify({ type: 'deleteMessage', payload: { messageId: msgObj.id, user: currentUser.uin } }));
                }
                break;
            case 'delete-for-all':
                if (confirm('Удалить сообщение для всех?') && msgObj && ws) {
                    ws.send(JSON.stringify({ type: 'deleteMessage', payload: { messageId: msgObj.id, user: currentUser.uin } }));
                }
                break;
        }
        contextMenu.classList.remove('active');
        activeMsgElement = null;
    });
});

// ---- Контекстное меню чатов ----
chatContextMenu.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', async function(e) {
        e.stopPropagation();
        const action = this.dataset.action;
        if (!activeChatElement) return;
        const chatId = activeChatElement.dataset.chatId;
        if (action === 'pin' || action === 'unpin') {
            try {
                await apiRequest(`/api/chats/${chatId}/pin`, { method: 'POST' });
                await loadUserData();
                loadChats();
            } catch (err) { alert('Ошибка: ' + err.message); }
        } else if (action === 'copy-id') {
            navigator.clipboard.writeText(chatId).then(() => alert('ID чата скопирован: ' + chatId));
        } else if (action === 'delete') {
            if (confirm('Удалить этот чат навсегда? (вы владелец?)')) {
                try {
                    await apiRequest(`/api/chats/${chatId}`, { method: 'DELETE' });
                    loadChats();
                } catch (err) { alert('Ошибка: ' + err.message); }
            }
        }
        chatContextMenu.classList.remove('active');
        activeChatElement = null;
    });
});

// ---- Настройки ----
function applyTheme(theme){
    appEl.className='app';
    if (theme === 'light-red') {
        appEl.classList.add('theme-light');
    } else {
        // dark-red — по умолчанию
    }
    const accent=getAvatarColor();
    document.querySelectorAll('.avatar').forEach(el=>{
        if(!el.style.background || el.style.background==='rgb(179, 58, 58)') el.style.background=accent;
    });
}
themeDots.forEach(dot=>{
    dot.addEventListener('click',function(){
        const theme=this.dataset.theme;
        themeDots.forEach(d=>d.classList.remove('active'));
        this.classList.add('active');
        applyTheme(theme);
        apiRequest('/api/me',{method:'PUT',body:JSON.stringify({theme})}).catch(err=>console.error(err));
    });
});

// --- Сохранение имени ---
saveUsernameBtn.addEventListener('click', async function() {
    const newUsername = settingsUsernameInput.value.trim();
    if (!newUsername) { alert('Введите имя'); return; }
    try {
        await apiRequest('/api/me', { method: 'PUT', body: JSON.stringify({ username: newUsername }) });
        currentUser.username = newUsername;
        alert('Имя обновлено');
        settingsUsernameInput.value = '';
    } catch (err) { alert('Ошибка: ' + err.message); }
});

// --- Сохранение глобального фона ---
saveBgBtn.addEventListener('click', async function() {
    const bg = settingsBgInput.value.trim();
    try {
        await apiRequest('/api/me', { method: 'PUT', body: JSON.stringify({ background: bg }) });
        globalBackground = bg;
        applyGlobalBackground();
        alert('Фон обновлён');
        settingsBgInput.value = '';
    } catch (err) { alert('Ошибка: ' + err.message); }
});

// --- Копирование UIN ---
copyUinBtn.addEventListener('click', function() {
    const uin = settingsUin.textContent.trim();
    if (uin && uin !== '-------') {
        navigator.clipboard.writeText(uin).then(() => alert('UIN скопирован'));
    }
});

// --- Открытие настроек ---
function openSettings() {
    if (currentUser) {
        settingsUin.textContent = currentUser.uin;
        settingsUsernameInput.value = '';
        settingsBgInput.value = globalBackground || '';
    }
    renderAccounts();
    settingsModal.classList.add('active');
}

settingsOpenBtn.addEventListener('click', openSettings);
settingsCloseBtn.addEventListener('click', () => settingsModal.classList.remove('active'));
settingsModal.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
});

// --- Выход из аккаунта ---
logoutBtn.addEventListener('click', function() {
    if (confirm('Выйти из аккаунта?')) {
        logout();
        settingsModal.classList.remove('active');
    }
});

// --- Управление аккаунтами ---
function renderAccounts() {
    if (!savedAccounts || savedAccounts.length === 0) {
        accountsList.innerHTML = '<div style="color:var(--text3); font-size:12px;">Нет сохранённых аккаунтов</div>';
        return;
    }
    let html = '';
    savedAccounts.forEach((acc, index) => {
        const isActive = index === currentAccountIndex && token;
        html += `
            <div class="account-item">
                <div class="account-info">
                    <span class="acc-username">${acc.username}</span>
                    <span class="acc-uin">UIN: ${acc.uin}</span>
                </div>
                ${isActive ? '<span style="color:var(--accent); font-size:12px;">✅ активен</span>' :
                    `<button class="acc-switch-btn" data-index="${index}">Переключить</button>`}
            </div>
        `;
    });
    accountsList.innerHTML = html;
    accountsList.querySelectorAll('.acc-switch-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const index = parseInt(this.dataset.index);
            switchAccount(index);
        });
    });
}

function switchAccount(index) {
    const acc = savedAccounts[index];
    if (!acc) return;
    logout();
    login(acc.uin, acc.password);
    currentAccountIndex = index;
    localStorage.setItem('krista_current_account', String(index));
}

function addAccount() {
    loginModal.classList.add('active');
}

const originalAfterLogin = afterLogin;
afterLogin = function() {
    originalAfterLogin();
    if (currentUser) {
        const exists = savedAccounts.some(a => a.uin === currentUser.uin);
        if (!exists) {
            savedAccounts.push({
                uin: currentUser.uin,
                username: currentUser.username,
                password: loginPassword.value
            });
            localStorage.setItem('krista_accounts', JSON.stringify(savedAccounts));
            currentAccountIndex = savedAccounts.length - 1;
            localStorage.setItem('krista_current_account', String(currentAccountIndex));
        }
        renderAccounts();
    }
};

addAccountBtn.addEventListener('click', function() {
    settingsModal.classList.remove('active');
    loginModal.classList.add('active');
});

deleteAccountBtn.addEventListener('click', async function() {
    if (!currentUser) return;
    if (!confirm(`Удалить аккаунт ${currentUser.username} (UIN: ${currentUser.uin}) навсегда?\n\nВСЕ ваши чаты и сообщения будут удалены!`)) return;
    try {
        await apiRequest('/api/me', { method: 'DELETE' });
        savedAccounts = savedAccounts.filter(a => a.uin !== currentUser.uin);
        localStorage.setItem('krista_accounts', JSON.stringify(savedAccounts));
        if (savedAccounts.length > 0) {
            switchAccount(0);
        } else {
            logout();
        }
        settingsModal.classList.remove('active');
        alert('Аккаунт удалён');
    } catch (err) {
        alert('Ошибка удаления: ' + err.message);
    }
});

// ---- Создание чата ----
createChatBtn.addEventListener('click', function() {
    createChatModal.classList.add('active');
    chatNameInput.value='';
    chatBgInput.value='';
    document.querySelectorAll('.color-option').forEach(el => {
        el.classList.remove('active');
        el.style.borderColor = 'var(--border)';
    });
    document.querySelector('.color-option[data-color="default"]').classList.add('active');
    document.querySelector('.color-option[data-color="default"]').style.borderColor = 'var(--accent)';
    selectedColor = 'default';
});
createChatCloseBtn.addEventListener('click', ()=>createChatModal.classList.remove('active'));

document.querySelectorAll('.color-option').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.color-option').forEach(b => {
            b.classList.remove('active');
            b.style.borderColor = 'var(--border)';
        });
        this.classList.add('active');
        this.style.borderColor = 'var(--accent)';
        selectedColor = this.dataset.color;
    });
});

createChatConfirmBtn.addEventListener('click', async function() {
    const type = chatTypeSelect.value;
    const name = chatNameInput.value.trim();
    const bg = chatBgInput.value.trim();
    if (!name) { alert('Введите название'); return; }
    try {
        const data = await apiRequest('/api/chats', {
            method: 'POST',
            body: JSON.stringify({
                type,
                name,
                members: [currentUser.uin],
                admins: [currentUser.uin],
                colorScheme: selectedColor,
                background: bg || ''
            })
        });
        if (data.success) { alert('Чат создан!'); createChatModal.classList.remove('active'); loadChats(); }
    } catch (err) { alert('Ошибка: ' + err.message); }
});

// ---- Поиск ----
searchInput.addEventListener('input', debounce(async function() {
    const query=this.value.trim();
    if(!query||query.length<2){ loadChats(); return; }
    try{
        const users=await apiRequest(`/api/search?q=${encodeURIComponent(query)}`);
        const filtered=chats.filter(chat=>
            chat.name.toLowerCase().includes(query.toLowerCase()) ||
            chat.members.some(m=>m.includes(query))
        );
        users.forEach(u=>{
            if(!filtered.find(c=>c.name===u.username)){
                filtered.push({
                    id:'search_'+u.uin,
                    type:'group',
                    name:u.username,
                    members:[u.uin],
                    lastMessage:null,
                    unreadCount:0,
                    updatedAt:new Date().toISOString()
                });
            }
        });
        renderSearchResults(filtered);
    } catch(err){ console.error('Ошибка поиска:',err); }
},300));

function renderSearchResults(results){
    if(results.length===0){
        chatList.innerHTML='<div class="chat-empty">Ничего не найдено</div>';
        return;
    }
    let html='';
    results.forEach(chat=>{
        const avatar=getInitials(chat.name);
        const isOnline = chat.members.some(m => onlineUsers[m] === true);
        html+=`
            <div class="chat-item" data-chat-id="${chat.id}">
                <div class="avatar-wrapper">
                    <div class="avatar" style="background:${getAvatarColor()};">${avatar}</div>
                    <div class="status-dot ${isOnline?'online':''}"></div>
                </div>
                <div class="info">
                    <div class="name">
                        <span class="accent">${chat.name}</span>
                        <span class="chat-uin">(${chat.id})</span>
                    </div>
                    <div class="last">${chat.lastMessage?chat.lastMessage.text:'Новый чат'}</div>
                </div>
            </div>
        `;
    });
    chatList.innerHTML=html;
    chatList.querySelectorAll('.chat-item').forEach(el=>{
        el.addEventListener('click',function(){
            const chatId=this.dataset.chatId;
            if(chatId.startsWith('search_')){
                const uin=chatId.replace('search_','');
                createChatWithUser(uin);
            } else openChat(chatId);
        });
    });
}
async function createChatWithUser(uin){
    try{
        const data=await apiRequest('/api/chats',{
            method:'POST',
            body:JSON.stringify({type:'group',name:uin,members:[currentUser.uin,uin],admins:[currentUser.uin],colorScheme:'default',background:''})
        });
        if(data.success){
            loadChats();
            setTimeout(()=>{
                const chat=chats.find(c=>c.id===data.chatId);
                if(chat) openChat(chat.id);
            },500);
        }
    } catch(err){ alert('Ошибка создания чата: '+err.message); }
}

function debounce(func,wait){
    let timeout;
    return function(...args){
        clearTimeout(timeout);
        timeout=setTimeout(()=>func.apply(this,args),wait);
    };
}

// ---- Обработка ввода ----
msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

// ---- Закрытие модалок ----
document.querySelectorAll('.modal-overlay').forEach(modal => {
    modal.addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('active');
    });
});

// ---- Вход/Регистрация ----
loginCloseBtn.addEventListener('click', ()=>loginModal.classList.remove('active'));
loginBtn.addEventListener('click', function() {
    const uin = loginUinOrName.value.trim();
    const password = loginPassword.value.trim();
    if (!uin || !password) { showError('Заполните все поля'); return; }
    login(uin, password);
});
registerBtn.addEventListener('click', function() {

    const password = loginPassword.value.trim();
    if (!username || !password) { showError('Заполните все поля'); return; }
    register(username, password);
});
loginPassword.addEventListener('keydown', function(e){ if (e.key === 'Enter') loginBtn.click(); });

// ---- Инициализация ----
if (token) {
    loadUserData().then(() => {
        connectWebSocket();
        loadChats();
    }).catch(() => logout());
} else {
    setTimeout(() => loginModal.classList.add('active'), 500);
}

backBtn.addEventListener('click', function() {
    detail.classList.remove('active');
    currentChatId = null;
});

// ---- Применение темы ----
const savedTheme = localStorage.getItem('krista_theme') || 'dark-red';
applyTheme(savedTheme);
themeDots.forEach(d => d.classList.toggle('active', d.dataset.theme === savedTheme));

// ---- Наблюдатель за аватарами ----
const observer = new MutationObserver(() => {
    const accent = getAvatarColor();
    document.querySelectorAll('.avatar').forEach(el => {
        if (!el.style.background || el.style.background === 'rgb(179, 58, 58)') el.style.background = accent;
    });
});
observer.observe(appEl, { attributes: true, attributeFilter: ['class'] });

console.log('✅ Криста.Мессенджер 4.0 запущен!');
</script>
