<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="manifest" href="/manifest.json">
  <title>К.Мессенджер 2.0</title>
  <style>
    /* ---------- ПЕРЕМЕННЫЕ ---------- */
    :root {
      --bg: #0a0a0a;
      --surface: rgba(20, 20, 20, 0.85);
      --green: #00cc66;
      --red: #ff3333;
      --text: #e0e0e0;
      --text-secondary: #aaaaaa;
      --radius: 16px;
      --blur: blur(20px);
      --bg-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400"><defs><linearGradient id="g" x1="0%25" y1="0%25" x2="100%25" y2="100%25"><stop offset="0%25" stop-color="%231a1a1a"/><stop offset="100%25" stop-color="%23060b12"/></linearGradient></defs><rect width="400" height="400" fill="url(%23g)"/><circle cx="200" cy="200" r="80" fill="none" stroke="%2300cc66" stroke-width="0.5" opacity="0.15"/></svg>');
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg) center/cover fixed;
      background-image: var(--bg-image);
      color: var(--text);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .app-container {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 900px;
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
      position: relative;
    }
    /* Вкладки */
    .tab {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      gap: 12px;
    }
    .tab.active { display: flex; }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 1.1rem;
    }
    .search-bar {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 14px;
      color: white;
      outline: none;
      width: 100%;
      font-size: 0.95rem;
    }
    .channel-card, .chat-item, .search-result-item {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .channel-card:hover, .chat-item:hover, .search-result-item:hover { background: rgba(255,255,255,0.1); }
    .unread { border-left: 3px solid var(--green); }
    .uin { font-size: 0.75rem; color: var(--text-secondary); margin-left: 6px; }
    .nickname-color { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    .message {
      margin-bottom: 8px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    .message .sender { font-weight: 600; display: flex; align-items: center; gap: 4px; }
    .message .time { font-size: 0.7rem; color: var(--text-secondary); }
    .input-row {
      display: flex;
      gap: 8px;
      padding: 10px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: var(--surface);
      backdrop-filter: blur(20px);
    }
    .input-row input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 10px;
      color: white;
    }
    .btn {
      background: var(--green);
      color: #0a0a0a;
      border: none;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn.danger { background: var(--red); color: white; }
    .btn.small { padding: 6px 12px; font-size: 0.9rem; }
    .settings-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }
    .settings-field label { font-size: 0.8rem; color: var(--text-secondary); }
    .settings-field input, .settings-field select {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px;
      color: white;
    }
    .back-btn {
      background: none;
      border: none;
      color: var(--green);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0 10px;
    }
    .mention-list {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border-radius: 12px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
      flex-direction: column;
      max-height: 150px;
      overflow-y: auto;
      margin-top: 8px;
    }
    .mention-item {
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }
    .mention-item:hover { background: rgba(255,255,255,0.1); }
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 8px 0 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.3);
      margin-top: auto;
    }
    .nav-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.85rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 8px 20px;
      border-radius: 12px;
      transition: 0.2s;
    }
    .nav-btn.active { color: var(--green); background: rgba(0,204,102,0.1); }
    .auth-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      z-index: 20;
      padding: 20px;
    }
    .auth-overlay input { width: 100%; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app-container" id="app">
  <!-- Окно авторизации (начальный экран) -->
  <div id="auth-overlay" class="auth-overlay">
    <h2>Добро пожаловать</h2>
    <input type="text" id="auth-nickname" placeholder="Никнейм" class="search-bar">
    <input type="password" id="auth-password" placeholder="Пароль" class="search-bar">
    <div style="display: flex; gap: 10px; width: 100%;">
      <button class="btn" onclick="login()" style="flex:1;">Войти</button>
      <button class="btn" onclick="register()" style="flex:1;">Регистрация</button>
    </div>
    <button class="btn" style="background:transparent; border:1px solid var(--green); color:var(--green); width:100%;" onclick="continueAsGuest()">Продолжить как гость</button>
  </div>

  <!-- Вкладка: Главный экран (чаты) -->
  <div id="tab-chats" class="tab">
    <div class="header-row">
      <span id="header-title">К.Мессенджер</span>
      <span id="header-user" style="font-size:0.8rem; opacity:0.7;">Гость</span>
    </div>
    <input type="text" class="search-bar" id="searchInput" placeholder="Поиск по UIN..." oninput="handleSearch()">
    <!-- Контейнер для результатов поиска (динамически) -->
    <div id="search-results" style="display:none; flex-direction: column; gap:8px;"></div>
    <!-- Топ каналов -->
    <div id="top-channels-section" style="display: flex; flex-direction: column; gap: 8px;">
      <div style="font-weight:600;">🔥 Топ каналов</div>
      <div id="top-channels"></div>
    </div>
    <!-- Список чатов -->
    <div style="font-weight:600;">💬 Чаты</div>
    <div id="chat-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
  </div>

  <!-- Вкладка: Окно чата -->
  <div id="tab-chat-window" class="tab">
    <div class="header-row">
      <button class="back-btn" onclick="closeChat()">←</button>
      <span id="chat-title"></span>
      <span></span>
    </div>
    <div id="chat-messages" style="flex:1; display:flex; flex-direction:column; gap:6px;"></div>
    <div class="input-row" id="chat-input-row" style="display: none;">
      <input type="text" id="msgInput" placeholder="Сообщение...">
      <button class="btn" onclick="sendMessage()">➤</button>
      <button class="btn" style="background:transparent; color:white; border:1px solid rgba(255,255,255,0.2);" onclick="toggleMentionList()">@</button>
    </div>
    <div class="mention-list" id="mentionList"></div>
  </div>

  <!-- Вкладка: Создать -->
  <div id="tab-create" class="tab">
    <div class="header-row">Создать</div>
    <div class="settings-field"><label>Тип</label><select id="new-type"><option value="group">Групповой чат</option><option value="channel">Канал</option></select></div>
    <div class="settings-field"><label>Название</label><input type="text" id="new-name" placeholder="Название"></div>
    <button class="btn" onclick="createChat()">Создать</button>
  </div>

  <!-- Вкладка: Настройки -->
  <div id="tab-settings" class="tab">
    <div class="header-row">Настройки</div>
    <div class="settings-field"><label>Имя</label><input type="text" id="set-displayname" placeholder="Ваше имя"></div>
    <div class="settings-field"><label>Цвет ника</label><input type="color" id="set-color" value="#00cc66"></div>
    <div class="settings-field"><label>Показывать UIN рядом с именем</label><input type="checkbox" id="set-showuin" checked></div>
    <div class="settings-field"><label>Ваш UIN</label><input type="text" id="set-uin" readonly></div>
    <div class="settings-field"><label>URL фонового изображения</label><input type="text" id="set-bgurl" placeholder="https://..."></div>
    <div class="settings-field"><label>Мастер-пароль (админ на 5 мин)</label><input type="password" id="set-master"></div>
    <button class="btn" onclick="saveSettings()">Сохранить</button>
    <button class="btn danger small" onclick="getAdminToken()">Получить админ-токен</button>
  </div>

  <!-- Нижняя панель -->
  <div class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('chats')">💬 Главная</button>
    <button class="nav-btn" onclick="switchTab('create')">➕ Создать</button>
    <button class="nav-btn" onclick="switchTab('settings')">⚙️ Настройки</button>
  </div>
</div>

<script>
  // ---------- ГЛОБАЛЬНОЕ СОСТОЯНИЕ (модуль через замыкание) ----------
  const App = (() => {
    // Приватные переменные
    let token = null;
    let currentUser = null;   // { uin, nickname, displayName, color, showUin }
    let currentChat = null;   // { uin, name, type }
    let chatParticipants = []; // для упоминаний
    let ws = null;
    let currentTab = 'chats';
    let searchTimeout = null;

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    function init() {
      // Проверить, есть ли сохранённый токен
      const savedToken = localStorage.getItem('km_token');
      if (savedToken) {
        token = savedToken;
        fetchUserProfile();
      }
      // Загрузить фоновое изображение из localStorage
      const savedBg = localStorage.getItem('km_bg');
      if (savedBg) {
        document.documentElement.style.setProperty('--bg-image', `url(${savedBg})`);
        document.getElementById('set-bgurl').value = savedBg;
      }
      // Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    }

    // ---------- АВТОРИЗАЦИЯ ----------
    async function login() {
      const nickname = document.getElementById('auth-nickname').value.trim();
      const password = document.getElementById('auth-password').value.trim();
      if (!nickname || !password) return alert('Введите никнейм и пароль');
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({nickname, password})
        });
        const data = await res.json();
        if (res.ok) {
          token = data.token;
          localStorage.setItem('km_token', token);
          currentUser = data.user;
          updateUIAfterAuth();
          document.getElementById('auth-overlay').classList.add('hidden');
        } else {
          alert(data.error);
        }
      } catch(e) { alert('Ошибка сети'); }
    }

    async function register() {
      const nickname = document.getElementById('auth-nickname').value.trim();
      const password = document.getElementById('auth-password').value.trim();
      if (!nickname || !password) return alert('Введите никнейм и пароль (мин.6 символов)');
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({nickname, password})
        });
        const data = await res.json();
        if (res.ok) {
          token = data.token;
          localStorage.setItem('km_token', token);
          currentUser = data.user;
          updateUIAfterAuth();
          document.getElementById('auth-overlay').classList.add('hidden');
        } else {
          alert(data.error);
        }
      } catch(e) { alert('Ошибка сети'); }
    }

    function continueAsGuest() {
      token = null;
      currentUser = null;
      document.getElementById('auth-overlay').classList.add('hidden');
      updateUIAfterAuth();
      loadChats();
    }

    function logout() {
      token = null;
      currentUser = null;
      localStorage.removeItem('km_token');
      document.getElementById('auth-overlay').classList.remove('hidden');
      // Очистить UI
      document.getElementById('header-user').innerText = 'Гость';
      document.getElementById('chat-input-row').style.display = 'none';
      currentChat = null;
      switchTab('chats');
      loadChats();
    }

    async function fetchUserProfile() {
      try {
        const res = await fetch('/api/user/me', {
          headers: {'Authorization': `Bearer ${token}`}
        });
        if (res.ok) {
          currentUser = await res.json();
          updateUIAfterAuth();
          loadChats();
        } else {
          // Токен недействителен
          token = null;
          localStorage.removeItem('km_token');
        }
      } catch(e) {}
    }

    function updateUIAfterAuth() {
      if (currentUser) {
        document.getElementById('header-user').innerText = currentUser.nickname;
        document.getElementById('set-displayname').value = currentUser.displayName || '';
        document.getElementById('set-color').value = currentUser.color || '#00cc66';
        document.getElementById('set-showuin').checked = currentUser.showUin !== false;
        document.getElementById('set-uin').value = currentUser.uin;
        connectWebSocket();
      } else {
        document.getElementById('header-user').innerText = 'Гость';
        document.getElementById('set-uin').value = '';
        disconnectWebSocket();
      }
      loadChats();
    }

    // ---------- WEBSOCKET ----------
    function connectWebSocket() {
      if (!token) return;
      disconnectWebSocket();
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);
      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'auth', token }));
      };
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'new_message' && currentChat && msg.message.chatUin === currentChat.uin) {
          appendMessageToChat(msg.message);
        }
      };
      ws.onclose = () => { /* автоматически переподключать не будем для простоты */ };
    }

    function disconnectWebSocket() {
      if (ws) { ws.close(); ws = null; }
    }

    // ---------- ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ----------
    function switchTab(tabName) {
      if (currentTab === tabName) return;
      document.getElementById('tab-' + currentTab).classList.remove('active');
      document.getElementById('tab-' + tabName).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const idx = { chats:0, create:1, settings:2 }[tabName];
      if (idx !== undefined) document.querySelectorAll('.nav-btn')[idx].classList.add('active');
      document.getElementById('bottom-nav').style.display = (tabName === 'chat-window') ? 'none' : 'flex';
      currentTab = tabName;
      if (tabName === 'chats') {
        loadChats();
        // Скрыть результаты поиска, если были
        document.getElementById('search-results').style.display = 'none';
        document.getElementById('top-channels-section').style.display = 'flex';
        document.getElementById('chat-list').style.display = 'flex';
      }
      if (tabName === 'chat-window' && currentChat) {
        loadMessages();
      }
    }

    // ---------- ЗАГРУЗКА ЧАТОВ ----------
    async function loadChats() {
      try {
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
        const res = await fetch('/api/chats', { headers });
        const data = await res.json();
        renderTopChannels(data.topChannels);
        renderChatList(data.chats);
      } catch(e) { console.error(e); }
    }

    function renderTopChannels(channels) {
      const container = document.getElementById('top-channels');
      container.innerHTML = channels.map(c => `
        <div class="channel-card" onclick="App.openChannel('${c.uin}','${c.name.replace(/'/g, "\\'")}')">
          <span>📢 ${escapeHtml(c.name)}</span><span>${c.uin} <small>${c.subCount} подп.</small></span>
        </div>
      `).join('');
    }

    function renderChatList(chats) {
      const container = document.getElementById('chat-list');
      container.innerHTML = chats.map(c => {
        let name = escapeHtml(c.name);
        let lastMsgText = c.lastMessage ? escapeHtml(c.lastMessage.text.substring(0, 30)) : '';
        let hasNewClass = c.hasNew ? 'unread' : '';
        return `<div class="chat-item ${hasNewClass}" onclick="App.openChat('${c.uin}','${name.replace(/'/g, "\\'")}','${c.type}')">
          <span>${name} <span class="uin">${c.uin}</span></span>
          <span style="color:var(--text-secondary);">${lastMsgText} ${c.hasNew ? '●' : ''}</span>
        </div>`;
      }).join('');
    }

    // ---------- ПОИСК ----------
    function handleSearch() {
      const q = document.getElementById('searchInput').value.trim();
      clearTimeout(searchTimeout);
      if (q.length === 0) {
        document.getElementById('search-results').style.display = 'none';
        document.getElementById('top-channels-section').style.display = 'flex';
        document.getElementById('chat-list').style.display = 'flex';
        return;
      }
      searchTimeout = setTimeout(() => performSearch(q), 300);
    }

    async function performSearch(q) {
      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        const container = document.getElementById('search-results');
        let html = '';
        if (data.users.length > 0) {
          html += '<div style="font-weight:600;">Пользователи</div>';
          html += data.users.map(u => {
            let colorDot = `<span class="nickname-color" style="background:${u.color};"></span>`;
            let uin = u.showUin !== false ? ` <span class="uin">${u.uin}</span>` : '';
            return `<div class="search-result-item" onclick="App.openPrivateChat('${u.uin}','${u.nickname}')">${colorDot}${u.displayName || u.nickname}${uin}</div>`;
          }).join('');
        }
        if (data.chats.length > 0) {
          html += '<div style="font-weight:600; margin-top:8px;">Чаты и каналы</div>';
          html += data.chats.map(c => {
            return `<div class="search-result-item" onclick="App.openChat('${c.uin}','${c.name.replace(/'/g, "\\'")}','${c.type}')">${c.name} <span class="uin">${c.uin}</span> (${c.type})</div>`;
          }).join('');
        }
        if (html === '') html = '<div style="color:var(--text-secondary);">Ничего не найдено</div>';
        container.innerHTML = html;
        container.style.display = 'flex';
        // Скрываем обычный список и топ, показываем результаты
        document.getElementById('top-channels-section').style.display = 'none';
        document.getElementById('chat-list').style.display = 'none';
      } catch(e) { console.error(e); }
    }

    // ---------- ОТКРЫТИЕ ЧАТА/КАНАЛА ----------
    function openChat(uin, name, type) {
      currentChat = { uin, name, type };
      document.getElementById('chat-title').innerHTML = `${name} <span class="uin">${uin}</span>`;
      // Показываем поле ввода, только если пользователь авторизован и имеет право писать
      const canWrite = token && (
        type === 'general' || type === 'group' || type === 'private' || (type === 'channel' && /* создатель */ false /* проверим на сервере */)
      );
      document.getElementById('chat-input-row').style.display = token ? 'flex' : 'none'; // упрощённо: показываем для всех авторизованных, сервер сам проверит
      switchTab('chat-window');
      loadMessages();
    }

    function openChannel(uin, name) {
      openChat(uin, name, 'channel');
    }

    function openPrivateChat(uin, nickname) {
      // Для личного чата надо создать или найти существующий приватный чат
      // Здесь мы просто открываем фейковый чат? По заданию личные сообщения должны быть.
      // Реализуем позже: создадим личный чат при первом сообщении. Пока заглушка.
      alert('Личные сообщения будут доступны после создания чата (в разработке)');
    }

    function closeChat() {
      currentChat = null;
      switchTab('chats');
    }

    // ---------- СООБЩЕНИЯ ----------
    async function loadMessages() {
      if (!currentChat) return;
      try {
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
        const res = await fetch(`/api/chats/${currentChat.uin}/messages`, { headers });
        const msgs = await res.json();
        const container = document.getElementById('chat-messages');
        container.innerHTML = msgs.map(m => renderMessage(m)).join('');
        container.scrollTop = container.scrollHeight;
        // Загрузить список участников для упоминаний (только для групп и общего)
        if (currentChat.type === 'group' || currentChat.type === 'general') {
          loadParticipantsForMention();
        }
      } catch(e) { console.error(e); }
    }

    function renderMessage(msg) {
      let senderName = msg.senderUin; // заглушка, нужно получить имя по UIN
      // Мы не храним имя в сообщении, поэтому проще запросить список пользователей и кэшировать.
      // Для MVP будем выводить UIN, а цвет заменим.
      let color = '#00cc66';
      // Попробуем найти в глобальном кэше (загрузим при старте) — для простоты сделаем запрос к /api/user/uin?uin=... но не будем усложнять.
      // Пока отображаем просто "Пользователь UIN"
      return `
        <div class="message">
          <div class="sender"><span class="nickname-color" style="background:${color};"></span>${msg.senderUin}</div>
          <div>${escapeHtml(msg.text)}</div>
          <div class="time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
        </div>
      `;
    }

    function appendMessageToChat(msg) {
      const container = document.getElementById('chat-messages');
      const shouldScroll = container.scrollTop + container.clientHeight >= container.scrollHeight - 50;
      container.insertAdjacentHTML('beforeend', renderMessage(msg));
      if (shouldScroll) container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      if (!token || !currentChat) return;
      const text = document.getElementById('msgInput').value.trim();
      if (!text) return;
      try {
        const res = await fetch(`/api/chats/${currentChat.uin}/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ text })
        });
        if (res.ok) {
          document.getElementById('msgInput').value = '';
        } else {
          const data = await res.json();
          alert(data.error);
        }
      } catch(e) { alert('Ошибка отправки'); }
    }

    // ---------- УПОМИНАНИЯ ----------
    async function loadParticipantsForMention() {
      try {
        const res = await fetch(`/api/chats/${currentChat.uin}/participants`, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {}
        });
        const data = await res.json();
        chatParticipants = data; // массив { uin, nickname, color }
        renderMentionList();
      } catch(e) {}
    }

    function renderMentionList() {
      const list = document.getElementById('mentionList');
      list.innerHTML = chatParticipants.map(p => `
        <div class="mention-item" onclick="App.insertMention('${p.nickname}')">
          <span class="nickname-color" style="background:${p.color};"></span>${p.nickname}
        </div>
      `).join('');
    }

    function toggleMentionList() {
      const list = document.getElementById('mentionList');
      list.style.display = list.style.display === 'flex' ? 'none' : 'flex';
    }

    function insertMention(nick) {
      document.getElementById('msgInput').value += '@' + nick + ' ';
      document.getElementById('mentionList').style.display = 'none';
    }

    // ---------- НАСТРОЙКИ ----------
    async function saveSettings() {
      if (!token) return alert('Вы не авторизованы');
      const displayName = document.getElementById('set-displayname').value.trim();
      const color = document.getElementById('set-color').value;
      const showUin = document.getElementById('set-showuin').checked;
      const bgUrl = document.getElementById('set-bgurl').value.trim();
      try {
        const res = await fetch('/api/user/me', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ displayName, nicknameColor: color, showUin })
        });
        if (res.ok) {
          currentUser.displayName = displayName;
          currentUser.color = color;
          currentUser.showUin = showUin;
          alert('Настройки сохранены');
        }
      } catch(e) {}
      // Сохранить фон в localStorage
      if (bgUrl) {
        localStorage.setItem('km_bg', bgUrl);
        document.documentElement.style.setProperty('--bg-image', `url(${bgUrl})`);
      } else {
        localStorage.removeItem('km_bg');
        document.documentElement.style.removeProperty('--bg-image');
      }
    }

    async function getAdminToken() {
      if (!token) return alert('Сначала войдите');
      const masterPassword = document.getElementById('set-master').value.trim();
      if (!masterPassword) return alert('Введите мастер-пароль');
      try {
        const res = await fetch('/api/admin/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ masterPassword })
        });
        const data = await res.json();
        if (res.ok) {
          // Сохраняем админ-токен (можно использовать для удаления)
          localStorage.setItem('km_admin_token', data.adminToken);
          alert('Админ-токен получен на 5 минут. Теперь вы можете удалять чаты и сообщения (кнопки появятся в интерфейсе)');
        } else {
          alert(data.error);
        }
      } catch(e) {}
    }

    // ---------- СОЗДАНИЕ ЧАТА/КАНАЛА ----------
    async function createChat() {
      if (!token) return alert('Авторизуйтесь');
      const type = document.getElementById('new-type').value;
      const name = document.getElementById('new-name').value.trim();
      if (!name) return alert('Введите название');
      try {
        const res = await fetch('/api/chats', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ name, type })
        });
        const data = await res.json();
        if (res.ok) {
          alert('Создано! UIN: ' + data.uin);
          switchTab('chats');
          loadChats();
        } else {
          alert(data.error);
        }
      } catch(e) { alert('Ошибка'); }
    }

    // Вспомогательная функция экранирования HTML
    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Публичные методы для вызова из HTML (привязываем к window)
    window.login = login;
    window.register = register;
    window.continueAsGuest = continueAsGuest;
    window.switchTab = switchTab;
    window.App = {
      openChat,
      openChannel,
      openPrivateChat,
      closeChat,
      sendMessage,
      toggleMentionList,
      insertMention,
      saveSettings,
      getAdminToken,
      createChat,
      handleSearch,
      loadChats
    };

    // Инициализация
    init();

    return { /* можно не возвращать */ };
  })();
</script>
</body>
</html>
