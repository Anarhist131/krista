<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>К. Мессенджер 0.21</title>
    <style>
        :root {
            --bg: rgba(10, 10, 10, 0.35);
            --surface: rgba(20, 20, 20, 0.45);
            --text: #cccccc;
            --text-secondary: #888888;
            --accent: #00cc66;
            --danger: #ff3333;
            --border: rgba(42, 42, 42, 0.5);
            --sidebar-width: 260px;
            --font: 'Segoe UI', system-ui, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background-color: #000;
            background-image: url('https://cdn.kibrispdr.org/data/9/background-aesthetic-purple-17.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
            margin: 0;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        #app {
            width: 1000px;
            height: 90vh;
            display: flex;
            background: var(--surface);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0,0,0,0.7);
            transition: width 0.3s ease, height 0.3s ease;
        }
        .sidebar {
            width: var(--sidebar-width);
            background: transparent;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { font-weight: 700; font-size: 17px; color: var(--accent); }
        .switch-btn {
            background: none; border: 1px solid var(--border); color: var(--text-secondary);
            padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
            backdrop-filter: blur(4px);
        }
        .switch-btn:hover { background: rgba(255,255,255,0.05); }
        .sidebar-search { padding: 8px 18px; border-bottom: 1px solid var(--border); }
        .sidebar-search input {
            width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border);
            background: rgba(30,30,30,0.5); color: var(--text); font-size: 13px; outline: none;
        }
        .popular-channels { padding: 10px 18px; border-bottom: 1px solid var(--border); }
        .popular-channels h4 {
            font-size: 12px; color: var(--accent); margin-bottom: 6px;
        }
        .popular-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 8px; margin-bottom: 3px; cursor: pointer; font-size: 13px;
            border: 1px solid rgba(0,204,102,0.25); border-radius: 6px;
            background: rgba(0,204,102,0.04); transition: 0.2s;
        }
        .popular-item:hover { border-color: var(--accent); }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 10px 18px; cursor: pointer; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; transition: background 0.2s;
            position: relative;
        }
        .chat-item:hover { background: rgba(255,255,255,0.03); }
        .chat-item.active { background: rgba(0,204,102,0.08); border-left: 3px solid var(--accent); }
        .chat-item .avatar {
            width: 32px; height: 32px; border-radius: 50%; background: #333;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            color: var(--accent); flex-shrink: 0; font-size: 14px;
        }
        .chat-item .info { flex: 1; min-width: 0; }
        .chat-item .name { font-weight: 600; color: var(--text); font-size: 14px; }
        .chat-item .nick { font-size: 11px; color: var(--text-secondary); }
        .chat-item .preview { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item .delete-chat-btn {
            display: none; position: absolute; right: 8px; background: none;
            border: none; color: var(--danger); cursor: pointer; font-size: 16px;
        }
        .chat-item.admin .delete-chat-btn { display: block; }

        .sidebar-footer {
            border-top: 1px solid var(--border);
            display: flex;
            gap: 6px;
            padding: 10px 18px;
        }
        .sidebar-footer button {
            flex: 1; padding: 8px 6px; border-radius: 6px; border: 1px solid var(--border);
            background: transparent; color: var(--text); cursor: pointer; font-weight: 600; font-size: 11px;
        }
        .sidebar-footer button.accent { border-color: var(--accent); color: var(--accent); }
        .sidebar-footer button.danger { border-color: var(--danger); color: var(--danger); }

        .main {
            flex: 1; display: flex; flex-direction: column; background: transparent;
        }
        .main-header {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            font-weight: 700; font-size: 17px; display: flex; align-items: center;
            justify-content: space-between; backdrop-filter: blur(5px);
        }
        .messages { flex: 1; overflow-y: auto; padding: 16px 18px; font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.5; }
        .date-separator { color: var(--text-secondary); text-align: center; margin: 16px 0 8px; font-size: 13px; font-weight: bold; }
        .message { margin-bottom: 4px; word-break: break-word; position: relative; }
        .message .time { color: var(--text-secondary); }
        .message .nick { font-weight: bold; }
        .message .delete-btn { display: none; background: none; border: none; color: var(--danger); cursor: pointer; margin-left: 6px; font-size: 13px; }
        .message.admin .delete-btn { display: inline; }

        .input-area { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; gap: 10px; backdrop-filter: blur(5px); }
        .input-area input { flex: 1; padding: 9px 12px; border-radius: 6px; border: 1px solid var(--border); background: rgba(30,30,30,0.6); color: var(--text); font-size: 13px; }
        .input-area button { padding: 8px 16px; border-radius: 6px; border: none; background: var(--accent); color: #000; font-weight: 700; cursor: pointer; font-size: 13px; }

        .guest-banner { background: rgba(26,26,26,0.6); color: var(--text-secondary); text-align: center; padding: 8px; font-size: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }

        .mobile #app { width: 390px; height: 100vh; border-radius: 0; flex-direction: column; }
        .mobile .sidebar { display: flex; }
        .mobile .main { display: none; }
        .mobile .main.active { display: flex; }
        .mobile .sidebar.hidden { display: none; }
        .back-btn { display: none; background: none; border: none; color: var(--accent); font-size: 18px; margin-right: 8px; cursor: pointer; }
        .mobile .back-btn { display: inline-block !important; }

        .settings-content, .create-content { padding: 20px; overflow-y: auto; }
    </style>
</head>
<body class="mobile">
<div id="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo">К. Мессенджер</span>
            <button class="switch-btn" id="viewSwitch" onclick="toggleView()">🖥️ ПК</button>
        </div>
        <div class="sidebar-search">
            <input type="text" placeholder="Поиск..." id="searchInput" oninput="handleSearch(this.value)">
        </div>
        <div class="popular-channels" id="popularChannels">
            <h4>🔥 Популярные каналы</h4>
            <div id="popularList"></div>
        </div>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            <button class="accent" onclick="openCreateView()">✏️ Создать</button>
            <button onclick="openSettingsView()">⚙️ Настройки</button>
        </div>
    </div>

    <div class="main" id="mainArea">
        <div class="main-header">
            <button class="back-btn" id="mobileBackBtn" onclick="goBack()">← Назад</button>
            <span id="mainTitle"></span>
        </div>
        <div class="guest-banner" id="guestBanner" onclick="openAuthModal()">Вы гость. Чтобы писать, войдите или зарегистрируйтесь.</div>
        <div id="mainContent"></div>
    </div>
</div>

<script>
const state = {
    token: localStorage.getItem('krista_token') || null,
    currentUser: null,
    isAdmin: false,
    activeChatId: null,
    chats: [],
    messages: [],
    ws: null,
    isMobileView: localStorage.getItem('krista_viewMode') !== 'pc',
    enterSends: true
};

if (!state.isMobileView) document.body.classList.remove('mobile');
else document.body.classList.add('mobile');

async function api(url, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
    const res = await fetch(url, { ...options, headers });
    if (res.status === 401 && state.currentUser) { logout(); throw new Error('Unauthorized'); }
    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'Ошибка');
    return res;
}

async function init() {
    if (state.token) {
        try {
            state.currentUser = await (await api('/api/user/me')).json();
            if (state.currentUser) connectWebSocket();
            else { localStorage.removeItem('krista_token'); state.token = null; }
        } catch { localStorage.removeItem('krista_token'); state.token = null; }
    }
    await loadChats();
    await loadPopular();
    renderUI();
}

function connectWebSocket() {
    if (state.ws) state.ws.close();
    const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
    state.ws = new WebSocket(`${protocol}://${location.host}`);
    state.ws.onopen = () => { if (state.token) state.ws.send(JSON.stringify({ type: 'auth', token: state.token })); };
    state.ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        if (d.type === 'newMessage' && d.message.chatId === state.activeChatId) {
            state.messages.push(d.message);
            renderMessages();
        } else if (d.type === 'chatDeleted') {
            state.chats = state.chats.filter(c => c._id !== d.chatId);
            if (state.activeChatId === d.chatId) closeChatView();
            renderChatList();
        }
    };
    state.ws.onclose = () => { if (state.currentUser) setTimeout(connectWebSocket, 3000); };
}

async function loadChats() {
    state.chats = await (await api('/api/chats')).json();
    renderChatList();
}

async function loadPopular() {
    const popular = await (await fetch('/api/popular-channels')).json();
    document.getElementById('popularList').innerHTML = popular.map(c => `
        <div class="popular-item" onclick="openChat('${c._id}')">📢 ${c.name} <span class="subs">${c.subscribers.length}</span></div>
    `).join('');
}

function renderChatList() {
    document.getElementById('chatList').innerHTML = state.chats.map(chat => `
        <div class="chat-item ${chat._id === state.activeChatId ? 'active' : ''} ${state.isAdmin ? 'admin' : ''}" onclick="openChat('${chat._id}')">
            <div class="avatar">${chat.name.charAt(0)}</div>
            <div class="info">
                <div class="name">${chat.name} ${chat.isChannel ? '📢' : ''}</div>
                ${chat.nick ? `<div class="nick">@${chat.nick}</div>` : ''}
            </div>
            ${state.isAdmin ? `<button class="delete-chat-btn" onclick="event.stopPropagation(); deleteChat('${chat._id}')">❌</button>` : ''}
        </div>
    `).join('');
}

function openChat(chatId) {
    state.activeChatId = chatId;
    showMainView('chat');
    loadMessages();
    const chat = state.chats.find(c => c._id === chatId) || [];
    if (chat) {
        document.getElementById('mainTitle').innerHTML = `${chat.name} ${chat.nick ? `<span style="font-size:13px;color:var(--text-secondary);">@${chat.nick}</span>` : ''}`;
    }
}

function closeChatView() {
    state.activeChatId = null;
    if (state.isMobileView) {
        document.getElementById('sidebar').classList.remove('hidden');
        document.getElementById('mainArea').classList.remove('active');
    }
}

function showMainView(view) {
    const main = document.getElementById('mainArea');
    const sidebar = document.getElementById('sidebar');
    if (state.isMobileView) {
        sidebar.classList.add('hidden');
        main.classList.add('active');
    }
    const content = document.getElementById('mainContent');
    if (view === 'chat') {
        content.innerHTML = `
            <div class="messages" id="messagesContainer"></div>
            <div class="input-area">
                <input type="text" placeholder="Сообщение..." id="messageInput" ${state.currentUser ? '' : 'disabled'}>
                <button id="sendBtn" ${state.currentUser ? '' : 'disabled'} onclick="sendMessage()">Отправить</button>
            </div>
        `;
        if (!state.currentUser) {
            document.getElementById('guestBanner').style.display = 'block';
        } else {
            document.getElementById('guestBanner').style.display = 'none';
        }
    } else if (view === 'settings') {
        content.innerHTML = `<div class="settings-content"></div>`;
        renderSettings();
    } else if (view === 'create') {
        content.innerHTML = `<div class="create-content"></div>`;
        renderCreate();
    }
}

function goBack() {
    if (state.isMobileView) {
        document.getElementById('sidebar').classList.remove('hidden');
        document.getElementById('mainArea').classList.remove('active');
    }
}

async function loadMessages() {
    if (!state.activeChatId) return;
    const data = await (await api(`/api/messages/${state.activeChatId}?limit=50`)).json();
    state.messages = data.messages;
    renderMessages();
}

function renderMessages() {
    const container = document.getElementById('messagesContainer');
    if (!container) return;
    container.innerHTML = '';
    let lastDate = '';
    state.messages.forEach(msg => {
        const d = new Date(msg.timestamp);
        const dateStr = d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'2-digit' });
        if (dateStr !== lastDate) {
            lastDate = dateStr;
            const sep = document.createElement('div');
            sep.className = 'date-separator';
            sep.textContent = `====== ${dateStr} ======`;
            container.appendChild(sep);
        }
        const line = document.createElement('div');
        line.className = 'message' + (state.isAdmin ? ' admin' : '');
        const sender = msg.sender;
        const time = d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
        if (sender) {
            line.innerHTML = `<span class="time">[${time}]</span> <span class="nick" style="color:${sender.color || '#ccc'}">${sender.nickname}:</span> ${escapeHtml(msg.text)}`;
        } else {
            line.innerHTML = `<span>${escapeHtml(msg.text)}</span>`;
        }
        if (state.isAdmin && sender) {
            const btn = document.createElement('button');
            btn.className = 'delete-btn';
            btn.textContent = '❌';
            btn.onclick = () => deleteMessage(msg._id);
            line.appendChild(btn);
        }
        container.appendChild(line);
    });
    container.scrollTop = container.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('messageInput');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;
    if (state.ws && state.ws.readyState === WebSocket.OPEN) {
        state.ws.send(JSON.stringify({ type: 'message', chatId: state.activeChatId, text }));
        input.value = '';
    }
}

function openSettingsView() {
    showMainView('settings');
}

function openCreateView() {
    showMainView('create');
}

function renderSettings() {
    const container = document.querySelector('.settings-content');
    if (!state.currentUser) {
        container.innerHTML = '<p>Войдите, чтобы открыть настройки</p>';
        return;
    }
    container.innerHTML = `
        <input type="text" id="setName" placeholder="Имя" value="${state.currentUser.name}">
        <input type="text" id="setNickname" placeholder="Никнейм" value="${state.currentUser.nickname}">
        <div style="margin:10px 0"><label>Цвет ника: <input type="color" id="setColor" value="${state.currentUser.color}"></label></div>
        <div style="margin:10px 0">
            <label>Ширина окна: <span id="widthValue">${parseInt(document.getElementById('app').style.width) || 1000}</span>px</label>
            <div style="display:flex; gap:6px; margin-top:4px;"><button onclick="changeWidth(-80)">−</button><button onclick="changeWidth(80)">+</button></div>
        </div>
        <div style="margin:10px 0">
            <label>Высота окна: <span id="heightValue">${parseInt(document.getElementById('app').style.height) || 90}vh</span></label>
            <div style="display:flex; gap:6px; margin-top:4px;"><button onclick="changeHeight(-8)">−</button><button onclick="changeHeight(8)">+</button></div>
        </div>
        <label><input type="checkbox" id="enterSendsCheckbox" ${state.enterSends ? 'checked' : ''} onchange="state.enterSends = this.checked"> Enter отправляет сообщение</label>
        <div style="margin:10px 0"><button onclick="saveSettings()">Сохранить</button></div>
        <div style="margin:10px 0"><input type="password" id="adminPassword" placeholder="Пароль мастер-доступа"><button onclick="activateAdmin()">Активировать</button></div>
        <div><button class="danger" onclick="logout()">Выйти</button></div>
        <div><button class="danger" onclick="deleteAccount()">Удалить аккаунт</button></div>
        <div style="margin-top:20px; text-align:center; color:var(--text-secondary); font-size:11px;">Версия 0.21 | 26 мая 2026<br>Студия ЛесГем Ком и Кiль Com.</div>
    `;
}

function changeWidth(delta) {
    const app = document.getElementById('app');
    let w = parseInt(app.style.width) || 1000;
    w = Math.max(600, Math.min(1400, w + delta));
    app.style.width = w + 'px';
    const span = document.getElementById('widthValue');
    if (span) span.textContent = w;
    localStorage.setItem('krista_appWidth', w);
}

function changeHeight(delta) {
    const app = document.getElementById('app');
    let h = parseInt(app.style.height) || 90;
    h = Math.max(50, Math.min(100, h + delta));
    app.style.height = h + 'vh';
    const span = document.getElementById('heightValue');
    if (span) span.textContent = h;
    localStorage.setItem('krista_appHeight', h);
}

async function saveSettings() {
    const name = document.getElementById('setName').value;
    const nickname = document.getElementById('setNickname').value;
    const color = document.getElementById('setColor').value;
    await api('/api/user/me', { method: 'PUT', body: JSON.stringify({ name, nickname, color }) });
    state.currentUser = await (await api('/api/user/me')).json();
    alert('Сохранено');
}

function renderCreate() {
    const container = document.querySelector('.create-content');
    container.innerHTML = `
        <h3>Создать</h3>
        <div style="display:flex; gap:8px; margin-bottom:12px;">
            <button id="chatTypeBtn" class="accent" onclick="setCreateType('chat')">Чат</button>
            <button id="channelTypeBtn" onclick="setCreateType('channel')">Канал</button>
        </div>
        <input type="text" id="createName" placeholder="Название">
        <input type="text" id="createNick" placeholder="Никнейм">
        <button onclick="createChat()">Создать</button>
    `;
    window._createType = 'chat';
}

function setCreateType(type) {
    window._createType = type;
    document.getElementById('chatTypeBtn').className = type === 'chat' ? 'accent' : '';
    document.getElementById('channelTypeBtn').className = type === 'channel' ? 'accent' : '';
}

async function createChat() {
    const name = document.getElementById('createName').value;
    const nick = document.getElementById('createNick').value;
    if (!name) return;
    await api('/api/chat', { method: 'POST', body: JSON.stringify({ name, nick, isChannel: window._createType === 'channel' }) });
    goBack();
    loadChats();
}

function toggleView() {
    state.isMobileView = !state.isMobileView;
    localStorage.setItem('krista_viewMode', state.isMobileView ? 'mobile' : 'pc');
    document.body.classList.toggle('mobile', state.isMobileView);
    if (!state.isMobileView) {
        document.getElementById('sidebar').classList.remove('hidden');
        document.getElementById('mainArea').classList.remove('active');
    }
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function deleteMessage(id) { if (state.ws) state.ws.send(JSON.stringify({ type: 'deleteMessage', messageId: id })); }
function deleteChat(id) { if (confirm('Удалить чат?')) { state.ws.send(JSON.stringify({ type: 'deleteChat', chatId: id })); } }

async function activateAdmin() {
    const pwd = document.getElementById('adminPassword').value;
    try {
        const res = await api('/api/admin/activate', { method: 'POST', body: JSON.stringify({ adminPassword: pwd }) });
        const data = await res.json();
        state.token = data.token;
        localStorage.setItem('krista_token', state.token);
        state.isAdmin = true;
        alert('Мастер-доступ активирован');
        connectWebSocket();
    } catch { alert('Неверный пароль'); }
}

function renderUI() {
    const guest = !state.currentUser;
    document.getElementById('guestBanner').style.display = guest ? 'block' : 'none';
}

const savedWidth = localStorage.getItem('krista_appWidth');
if (savedWidth) document.getElementById('app').style.width = savedWidth + 'px';
const savedHeight = localStorage.getItem('krista_appHeight');
if (savedHeight) document.getElementById('app').style.height = savedHeight + 'vh';

init();
</script>
</body>
</html>
