<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>К. Мессенджер 0.21</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --text: #cccccc;
            --text-secondary: #888888;
            --accent: #00cc66;
            --danger: #ff3333;
            --border: #2a2a2a;
            --sidebar-width: 280px;
            --font: 'Segoe UI', system-ui, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
            margin: 0;
        }
        #app {
            width: 1000px;
            height: 90vh;
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transition: width 0.3s ease, height 0.3s ease;
        }
        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-header .logo { font-weight: 700; font-size: 18px; color: var(--accent); }
        .switch-btn {
            background: none; border: 1px solid var(--border); color: var(--text-secondary);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        .switch-btn:hover { background: #1e1e1e; }
        .sidebar-search { padding: 10px 20px; border-bottom: 1px solid var(--border); }
        .sidebar-search input {
            width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
            background: #1e1e1e; color: var(--text); font-size: 14px; outline: none;
        }
        .sidebar-search input:focus { border-color: var(--accent); }
        .popular-channels { padding: 12px 20px; border-bottom: 1px solid var(--border); }
        .popular-channels h4 {
            font-size: 13px; color: var(--accent); margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(0,204,102,0.5);
        }
        .popular-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; margin-bottom: 4px; cursor: pointer; font-size: 14px;
            border: 1px solid rgba(0,204,102,0.3); border-radius: 6px;
            background: rgba(0,204,102,0.05); transition: 0.2s;
        }
        .popular-item:hover { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,204,102,0.3); }
        .popular-item .subs { font-size: 12px; color: var(--text-secondary); }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 14px 20px; cursor: pointer; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px; transition: background 0.2s;
        }
        .chat-item:hover { background: #1a1a1a; }
        .chat-item.active { background: #1a2a1a; border-left: 3px solid var(--accent); }
        .chat-item .avatar {
            width: 36px; height: 36px; border-radius: 50%; background: #333;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            color: var(--accent); flex-shrink: 0;
        }
        .chat-item .info { flex: 1; min-width: 0; }
        .chat-item .name { font-weight: 600; color: var(--text); }
        .chat-item .preview { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
        .sidebar-footer button {
            flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
            background: transparent; color: var(--text); cursor: pointer; font-weight: 600; font-size: 12px;
        }
        .sidebar-footer button:hover { background: #1e1e1e; }
        .sidebar-footer button.accent { border-color: var(--accent); color: var(--accent); }
        .sidebar-footer button.danger { border-color: var(--danger); color: var(--danger); }
        .main { flex: 1; display: flex; flex-direction: column; }
        .main-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 700;
            font-size: 18px; display: flex; align-items: center; justify-content: space-between;
        }
        .messages { flex: 1; overflow-y: auto; padding: 20px; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; }
        .message { margin-bottom: 6px; word-break: break-word; }
        .message .time { color: var(--text-secondary); }
        .message .nick { font-weight: bold; }
        .input-area { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        .input-area input {
            flex: 1; padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border);
            background: #1e1e1e; color: var(--text); font-size: 14px; outline: none;
        }
        .input-area input:focus { border-color: var(--accent); }
        .input-area button {
            padding: 10px 20px; border-radius: 6px; border: none; background: var(--accent);
            color: #000; font-weight: 700; cursor: pointer;
        }
        .guest-banner {
            background: #1a1a1a; color: var(--text-secondary); text-align: center;
            padding: 10px; font-size: 13px; border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .mobile #app { width: 390px; height: 100vh; border-radius: 0; }
        .mobile .main { display: none; }
        .mobile .main.active {
            display: flex; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; background: var(--surface);
        }
        .mobile .sidebar { width: 100%; }
        .mobile .back-btn { display: block !important; background: none; border: none; color: var(--accent); font-size: 18px; margin-right: 10px; cursor: pointer; }
        .back-btn { display: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 200; }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 24px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .modal-content h3 { color: var(--accent); margin-bottom: 16px; }
        .modal-content input[type="text"], .modal-content input[type="password"] {
            width: 100%; padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border);
            background: #1e1e1e; color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px;
        }
        .modal-content .color-input-wrapper { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .modal-content .color-input-wrapper input[type="color"] { width: 40px; height: 40px; border: none; cursor: pointer; background: transparent; }
        .modal-content .color-input-wrapper span { font-size: 14px; color: var(--text-secondary); }
        .modal-content button { width: 100%; padding: 12px; border-radius: 6px; border: none; background: var(--accent); color: #000; font-weight: 700; cursor: pointer; font-size: 14px; margin-top: 8px; }
        .modal-content button.danger { background: var(--danger); }
        .modal-content .row { display: flex; gap: 8px; }
        .modal-content .row button { flex: 1; }
    </style>
</head>
<body class="">
<div id="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo">К. Мессенджер</span>
            <button class="switch-btn" id="viewSwitch" onclick="toggleView()">📱 Телефон</button>
        </div>
        <div class="sidebar-search">
            <input type="text" placeholder="Поиск..." id="searchInput" oninput="handleSearch(this.value)">
        </div>
        <div class="popular-channels" id="popularChannels">
            <h4>🔥 Популярные каналы</h4>
            <div id="popularList"></div>
        </div>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer" id="sidebarFooter"></div>
    </div>
    <div class="main" id="mainArea">
        <div class="main-header">
            <button class="back-btn" id="mobileBackBtn" onclick="closeMobileChat()">← Назад</button>
            <span id="chatTitle">Общий чат</span>
            <span id="subscriberCount" style="color:var(--text-secondary); font-size:14px;"></span>
        </div>
        <div class="guest-banner" id="guestBanner" onclick="openAuthModal()">Вы гость. Чтобы писать, войдите или зарегистрируйтесь.</div>
        <div class="messages" id="messagesContainer"></div>
        <div class="input-area">
            <input type="text" placeholder="Сообщение..." id="messageInput" disabled>
            <button id="sendBtn" disabled>Отправить</button>
        </div>
    </div>
</div>
<div class="modal" id="createModal">
    <div class="modal-content">
        <h3>Создать</h3>
        <div class="row" style="margin-bottom:12px;">
            <button id="chatTypeBtn" class="accent" onclick="setCreateType('chat')">Чат</button>
            <button id="channelTypeBtn" onclick="setCreateType('channel')">Канал</button>
        </div>
        <input type="text" id="createName" placeholder="Название">
        <input type="text" id="createNick" placeholder="Никнейм">
        <button onclick="createChat()">Создать</button>
        <button class="danger" onclick="closeModal('createModal')">Отмена</button>
    </div>
</div>
<div class="modal" id="adminModal">
    <div class="modal-content">
        <h3>Мастер-доступ</h3>
        <input type="password" id="adminPassword" placeholder="Пароль">
        <button onclick="activateAdmin()">Активировать</button>
        <button class="danger" onclick="closeModal('adminModal')">Отмена</button>
    </div>
</div>
<div class="modal" id="authModal">
    <div class="modal-content">
        <h3>Вход</h3>
        <div id="loginForm">
            <input type="text" id="loginNick" placeholder="Никнейм">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <button class="danger" onclick="showRegister()">Регистрация</button>
        </div>
        <div id="registerForm" style="display:none;">
            <input type="text" id="regName" placeholder="Имя">
            <input type="text" id="regNick" placeholder="Никнейм">
            <input type="password" id="regPass" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
            <button class="danger" onclick="showLogin()">Назад</button>
        </div>
        <button class="danger" onclick="closeModal('authModal')">Закрыть</button>
    </div>
</div>
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3>Настройки</h3>
        <div id="settingsContent"></div>
        <button class="danger" onclick="closeModal('settingsModal')">Закрыть</button>
    </div>
</div>
<script>
const state = {
    token: localStorage.getItem('krista_token') || null,
    currentUser: null,
    isAdmin: false,
    activeChatId: null,
    chats: [],
    messages: [],
    ws: null,
    createType: 'chat',
    isMobileView: false,
    enterSends: true
};
async function api(url, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
    const res = await fetch(url, { ...options, headers });
    if (res.status === 401 && state.currentUser) { logout(); throw new Error('Unauthorized'); }
    if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Ошибка' }));
        throw new Error(err.error || 'Ошибка');
    }
    return res;
}
async function init() {
    if (state.token) {
        try {
            const res = await api('/api/user/me');
            state.currentUser = await res.json();
            if (state.currentUser) connectWebSocket();
            else { localStorage.removeItem('krista_token'); state.token = null; }
        } catch (e) { localStorage.removeItem('krista_token'); state.token = null; }
    }
    await loadChats();
    await loadPopularChannels();
    renderUI();
}
function connectWebSocket() {
    if (state.ws) state.ws.close();
    const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
    state.ws = new WebSocket(`${protocol}://${location.host}`);
    state.ws.onopen = () => { if (state.token) state.ws.send(JSON.stringify({ type: 'auth', token: state.token })); };
    state.ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'newMessage' && data.message.chatId === state.activeChatId) {
            state.messages.push(data.message);
            renderMessages();
        } else if (data.type === 'messageDeleted') {
            state.messages = state.messages.filter(m => m._id !== data.messageId);
            renderMessages();
        } else if (data.type === 'chatDeleted') {
            if (state.activeChatId === data.chatId) {
                state.activeChatId = state.chats.find(c => c._id !== data.chatId)?._id || null;
                if (state.activeChatId) selectChat(state.activeChatId);
                else state.activeChatId = null;
            }
            loadChats();
        }
    };
    state.ws.onclose = () => { if (state.currentUser) setTimeout(connectWebSocket, 3000); };
}
async function loadChats() {
    try {
        const res = await api('/api/chats', { skipError: true });
        state.chats = await res.json();
        if (state.chats.length > 0 && !state.activeChatId) state.activeChatId = state.chats[0]._id;
        renderChatList();
    } catch (e) {}
}
async function loadPopularChannels() {
    try {
        const res = await fetch('/api/popular-channels');
        const popular = await res.json();
        renderPopular(popular);
    } catch (e) {}
}
function renderPopular(popular) {
    document.getElementById('popularList').innerHTML = popular.map(c => `
        <div class="popular-item" onclick="selectChat('${c._id}')">
            <span>📢 ${c.name}</span><span class="subs">${c.subscribers.length}</span>
        </div>`).join('');
}
function renderChatList() {
    document.getElementById('chatList').innerHTML = state.chats.map(chat => `
        <div class="chat-item ${chat._id === state.activeChatId ? 'active' : ''}" onclick="selectChat('${chat._id}')">
            <div class="avatar">${chat.name.charAt(0)}</div>
            <div class="info"><div class="name">${chat.name} ${chat.isChannel ? '📢' : ''}</div><div class="preview">${chat.subscribers.length} участников</div></div>
        </div>`).join('');
}
function selectChat(chatId) {
    state.activeChatId = chatId;
    if (state.isMobileView) document.getElementById('mainArea').classList.add('active');
    renderChatList();
    loadMessages();
    const chat = state.chats.find(c => c._id === chatId);
    if (chat) {
        document.getElementById('chatTitle').textContent = chat.name;
        document.getElementById('subscriberCount').textContent = `${chat.subscribers.length} подписчиков`;
    }
}
function closeMobileChat() { document.getElementById('mainArea').classList.remove('active'); }
async function loadMessages() {
    if (!state.activeChatId) return;
    try {
        const res = await api(`/api/messages/${state.activeChatId}?limit=50`);
        const data = await res.json();
        state.messages = data.messages;
        renderMessages();
    } catch (e) {}
}
function renderMessages() {
    const container = document.getElementById('messagesContainer');
    container.innerHTML = state.messages.map(msg => {
        const sender = msg.sender;
        const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
        return `<div class="message"><span class="time">[${time}]</span> <span class="nick" style="color:${sender?.color || '#ccc'};">${sender?.nickname || 'Удалён'}:</span> ${escapeHtml(msg.text)}</div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
}
function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
function sendMessage() {
    if (!state.currentUser || !state.activeChatId) return;
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;
    if (state.ws && state.ws.readyState === WebSocket.OPEN) {
        state.ws.send(JSON.stringify({ type: 'message', chatId: state.activeChatId, text }));
        input.value = '';
    } else alert('Нет соединения');
}
// Админ
function openAdminModal() { document.getElementById('adminModal').classList.add('active'); }
async function activateAdmin() {
    const password = document.getElementById('adminPassword').value;
    try {
        const res = await api('/api/admin/activate', { method: 'POST', body: JSON.stringify({ adminPassword: password }) });
        const data = await res.json();
        state.token = data.token;
        localStorage.setItem('krista_token', state.token);
        state.isAdmin = true;
        closeModal('adminModal');
        renderUI();
        alert('Мастер-доступ активирован.');
    } catch (e) { alert('Неверный пароль'); }
}
// Создание
function openCreateModal() { document.getElementById('createModal').classList.add('active'); }
function setCreateType(type) {
    state.createType = type;
    document.getElementById('chatTypeBtn').className = type === 'chat' ? 'accent' : '';
    document.getElementById('channelTypeBtn').className = type === 'channel' ? 'accent' : '';
}
async function createChat() {
    const name = document.getElementById('createName').value.trim();
    const nick = document.getElementById('createNick').value.trim();
    if (!name) return;
    await api('/api/chat', { method: 'POST', body: JSON.stringify({ name, nick, isChannel: state.createType === 'channel' }) });
    closeModal('createModal');
    loadChats();
}
// Настройки
function openSettingsModal() {
    const content = document.getElementById('settingsContent');
    if (!state.currentUser) {
        content.innerHTML = '<p>Войдите для доступа к настройкам.</p>';
    } else {
        content.innerHTML = `
            <input type="text" id="setName" placeholder="Имя" value="${state.currentUser.name}">
            <input type="text" id="setNickname" placeholder="Никнейм" value="${state.currentUser.nickname}">
            <div class="color-input-wrapper"><label>Цвет ника:</label><input type="color" id="setColor" value="${state.currentUser.color}"><span>${state.currentUser.color}</span></div>
            <div style="margin: 10px 0;">
                <label>Ширина окна: <span id="widthValue">${parseInt(document.getElementById('app').style.width) || 1000}</span>px</label>
                <div style="display:flex; gap:8px;"><button onclick="changeWidth(-100)">−</button><button onclick="changeWidth(100)">+</button></div>
            </div>
            <div style="margin: 10px 0;">
                <label>Высота окна: <span id="heightValue">${parseInt(document.getElementById('app').style.height) || 90}vh</span></label>
                <div style="display:flex; gap:8px;"><button onclick="changeHeight(-10)">−</button><button onclick="changeHeight(10)">+</button></div>
            </div>
            <label><input type="checkbox" id="enterSendsCheckbox" ${state.enterSends ? 'checked' : ''} onchange="state.enterSends = this.checked"> Enter отправляет сообщение</label>
            <button onclick="saveSettings()">Сохранить</button>
            <button class="danger" onclick="deleteAccount()">Удалить аккаунт</button>
            <div style="margin-top:20px; color:var(--text-secondary); font-size:12px; text-align:center;">Версия 0.21 | 26 мая 2026<br>Студия ЛесГем Ком и Кiль Com.</div>
        `;
    }
    document.getElementById('settingsModal').classList.add('active');
}
function changeWidth(delta) {
    const app = document.getElementById('app');
    let w = parseInt(app.style.width) || 1000;
    w = Math.max(600, Math.min(1400, w + delta));
    app.style.width = w + 'px';
    const span = document.getElementById('widthValue');
    if (span) span.textContent = w;
    localStorage.setItem('krista_appWidth', w);
}
function changeHeight(delta) {
    const app = document.getElementById('app');
    let h = parseInt(app.style.height) || 90;
    h = Math.max(50, Math.min(100, h + delta));
    app.style.height = h + 'vh';
    const span = document.getElementById('heightValue');
    if (span) span.textContent = h;
    localStorage.setItem('krista_appHeight', h);
}
async function saveSettings() {
    const name = document.getElementById('setName').value.trim();
    const nickname = document.getElementById('setNickname').value.trim();
    const color = document.getElementById('setColor').value;
    await api('/api/user/me', { method: 'PUT', body: JSON.stringify({ name, nickname, color }) });
    state.currentUser = await (await api('/api/user/me')).json();
    closeModal('settingsModal');
}
async function deleteAccount() { if (confirm('Удалить аккаунт?')) { await api('/api/user/me', { method: 'DELETE' }); logout(); } }
// Авторизация
function openAuthModal() { document.getElementById('authModal').classList.add('active'); }
function showRegister() { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; }
function showLogin() { document.getElementById('registerForm').style.display='none'; document.getElementById('loginForm').style.display='block'; }
async function login() {
    const nickname = document.getElementById('loginNick').value.trim();
    const password = document.getElementById('loginPass').value;
    try {
        const res = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ nickname, password }) });
        const data = await res.json();
        state.token = data.token; state.currentUser = data.user;
        localStorage.setItem('krista_token', state.token);
        closeModal('authModal'); connectWebSocket(); loadChats(); renderUI();
    } catch (e) { alert(e.message); }
}
async function register() {
    const name = document.getElementById('regName').value.trim();
    const nickname = document.getElementById('regNick').value.trim();
    const password = document.getElementById('regPass').value;
    try {
        const res = await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ name, nickname, password }) });
        const data = await res.json();
        state.token = data.token; state.currentUser = data.user;
        localStorage.setItem('krista_token', state.token);
        closeModal('authModal'); connectWebSocket(); loadChats(); renderUI();
    } catch (e) { alert(e.message); }
}
function logout() {
    if (state.ws) state.ws.close();
    localStorage.removeItem('krista_token');
    state.token = null; state.currentUser = null; state.isAdmin = false;
    state.activeChatId = state.chats.length > 0 ? state.chats[0]._id : null;
    loadChats(); renderUI();
}
// Вид
function toggleView() {
    state.isMobileView = !state.isMobileView;
    document.body.classList.toggle('mobile', state.isMobileView);
    document.getElementById('viewSwitch').textContent = state.isMobileView ? '🖥️ ПК' : '📱 Телефон';
    if (!state.isMobileView) document.getElementById('mainArea').classList.remove('active');
}
// Поиск
function handleSearch(query) {
    document.querySelectorAll('.chat-item').forEach(item => {
        const name = item.querySelector('.name').textContent.toLowerCase();
        item.style.display = name.includes(query.toLowerCase()) ? '' : 'none';
    });
}
// UI
function renderUI() {
    const guest = !state.currentUser;
    document.getElementById('guestBanner').style.display = guest ? 'block' : 'none';
    document.getElementById('messageInput').disabled = guest;
    document.getElementById('sendBtn').disabled = guest;
    const footer = document.getElementById('sidebarFooter');
    if (guest) {
        footer.innerHTML = '<button class="accent" onclick="openAuthModal()" style="flex:1;">Войти / Регистрация</button>';
    } else {
        footer.innerHTML = `
            <button class="accent" onclick="openCreateModal()">+ Создать</button>
            <button onclick="openAdminModal()" id="adminBtn">🔑</button>
            <button onclick="openSettingsModal()">⚙️</button>
            <button class="danger" onclick="logout()" id="logoutBtn">Выйти</button>
        `;
    }
}
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
// Обработка клавиш
document.getElementById('messageInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        if (state.enterSends) { e.preventDefault(); sendMessage(); }
        // иначе разрешаем перенос строки (не делаем preventDefault)
    }
});
// Восстановление размеров
const savedWidth = localStorage.getItem('krista_appWidth');
if (savedWidth) document.getElementById('app').style.width = savedWidth + 'px';
const savedHeight = localStorage.getItem('krista_appHeight');
if (savedHeight) document.getElementById('app').style.height = savedHeight + 'vh';
// Старт
init();
</script>
</body>
