<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>К. Мессенджер 0.21</title>
    <style>
        :root {
            --bg: rgba(10, 10, 10, 0.35);
            --surface: rgba(20, 20, 20, 0.45);
            --text: #ccc;
            --text-secondary: #888;
            --accent: #00cc66;
            --danger: #ff3333;
            --border: rgba(42,42,42,0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            background: #000 url('https://cdn.kibrispdr.org/data/9/background-aesthetic-purple-17.jpg') center/cover fixed;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        #app {
            width: 390px; max-width: 100vw; height: 100vh;
            background: var(--surface); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border); border-radius: 20px; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .header {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .header .logo { font-weight: 700; font-size: 17px; color: var(--accent); }
        .back-btn { background: none; border: none; color: var(--accent); font-size: 18px; cursor: pointer; }
        .search-bar { padding: 8px 18px; border-bottom: 1px solid var(--border); }
        .search-bar input {
            width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border);
            background: rgba(30,30,30,0.5); color: var(--text); font-size: 13px; outline: none;
        }
        .popular { padding: 10px 18px; border-bottom: 1px solid var(--border); }
        .popular h4 { font-size: 12px; color: var(--accent); margin-bottom: 6px; }
        .popular-item {
            display: flex; justify-content: space-between; padding: 6px 8px; margin-bottom: 3px;
            border: 1px solid rgba(0,204,102,0.25); border-radius: 6px;
            background: rgba(0,204,102,0.04); cursor: pointer; font-size: 13px;
        }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 10px 18px; border-bottom: 1px solid var(--border);
            display: flex; gap: 10px; cursor: pointer;
        }
        .chat-item.active { background: rgba(0,204,102,0.08); border-left: 3px solid var(--accent); }
        .avatar {
            width: 32px; height: 32px; border-radius: 50%; background: #333;
            display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--accent);
        }
        .info .name { font-weight: 600; font-size: 14px; }
        .info .nick { font-size: 11px; color: var(--text-secondary); }
        .sidebar-footer {
            padding: 10px 18px; border-top: 1px solid var(--border); display: flex; gap: 6px;
        }
        .sidebar-footer button {
            flex: 1; padding: 8px; border-radius: 6px; border: 1px solid var(--border);
            background: transparent; color: var(--text); cursor: pointer; font-weight: 600; font-size: 11px;
        }
        .messages { flex: 1; overflow-y: auto; padding: 16px 18px; font-family: 'Consolas', monospace; font-size: 13px; }
        .date-sep { color: var(--text-secondary); text-align: center; margin: 16px 0 8px; font-weight: bold; }
        .msg { margin-bottom: 4px; }
        .msg .time { color: var(--text-secondary); }
        .msg .nick { font-weight: bold; }
        .input-area { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 9px 12px; border-radius: 6px; border: 1px solid var(--border); background: rgba(30,30,30,0.6); color: var(--text); }
        .input-area button { padding: 8px 16px; border-radius: 6px; border: none; background: var(--accent); color: #000; font-weight: 700; }
        .guest-banner { background: rgba(26,26,26,0.6); color: var(--text-secondary); text-align: center; padding: 8px; font-size: 12px; cursor: pointer; }
        .btn { padding: 12px; border-radius: 6px; border: none; background: var(--accent); color: #000; font-weight: 700; width: 100%; margin: 8px 0; }
        .btn.danger { background: var(--danger); }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center; z-index: 200;
        }
        .modal-content {
            background: rgba(20,20,20,0.95); border: 1px solid var(--border); border-radius: 16px;
            padding: 24px; width: 340px;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Главный экран (чаты) -->
    <div id="screen-chats" style="display:flex; flex-direction:column; height:100%;">
        <div class="header"><span class="logo">К. Мессенджер</span><div></div></div>
        <div class="search-bar"><input type="text" placeholder="Поиск..." id="searchInput" oninput="filterChats(this.value)"></div>
        <div class="popular"><h4>🔥 Популярные каналы</h4><div id="popularList"></div></div>
        <div class="chat-list" id="chatList"></div>
        <div class="guest-banner" id="guestBanner" onclick="openAuthModal()">Вы гость. Нажмите, чтобы войти.</div>
        <div class="sidebar-footer">
            <button style="border-color:var(--accent); color:var(--accent);" onclick="showScreen('create')">✏️ Создать</button>
            <button onclick="showScreen('settings')">⚙️ Настройки</button>
        </div>
    </div>

    <!-- Экран чата -->
    <div id="screen-chat" style="display:none; flex-direction:column; height:100%;">
        <div class="header">
            <button class="back-btn" onclick="showScreen('chats')">← Назад</button>
            <span id="chatTitle"></span>
            <span id="subCount" style="font-size:13px; color:var(--text-secondary);"></span>
        </div>
        <div class="guest-banner" id="chatGuestBanner" onclick="openAuthModal()">Вы гость. Нажмите, чтобы войти.</div>
        <div class="messages" id="msgContainer"></div>
        <div class="input-area">
            <input type="text" placeholder="Сообщение..." id="msgInput" disabled>
            <button id="sendBtn" disabled onclick="sendMsg()">Отправить</button>
        </div>
    </div>

    <!-- Экран настроек -->
    <div id="screen-settings" style="display:none; flex-direction:column; height:100%;">
        <div class="header"><button class="back-btn" onclick="showScreen('chats')">← Назад</button><span>Настройки</span><div></div></div>
        <div style="padding:20px; overflow-y:auto;" id="settingsContent">
            <p>Загрузка...</p>
        </div>
        <div style="text-align:center; color:var(--text-secondary); font-size:11px; padding:16px;">Версия 0.21 | Студия ЛесГем Ком и Кiль Com.</div>
    </div>

    <!-- Экран создания -->
    <div id="screen-create" style="display:none; flex-direction:column; height:100%;">
        <div class="header"><button class="back-btn" onclick="showScreen('chats')">← Назад</button><span>Создать</span><div></div></div>
        <div style="padding:20px; overflow-y:auto;" id="createContent">
            <h3>Создать</h3>
            <div style="display:flex; gap:8px; margin-bottom:12px;">
                <button id="typeChatBtn" style="flex:1; padding:8px; background:var(--accent); color:#000; border:none; border-radius:6px;" onclick="setCreateType('chat')">Чат</button>
                <button id="typeChannelBtn" style="flex:1; padding:8px; background:transparent; border:1px solid var(--border); color:var(--text); border-radius:6px;" onclick="setCreateType('channel')">Канал</button>
            </div>
            <input type="text" id="createName" placeholder="Название" style="width:100%; padding:10px; margin-bottom:8px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.6); color:var(--text);">
            <input type="text" id="createNick" placeholder="Никнейм" style="width:100%; padding:10px; margin-bottom:8px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.6); color:var(--text);">
            <button class="btn" onclick="createChat()">Создать</button>
        </div>
    </div>
</div>

<!-- Модальное окно входа -->
<div id="authModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3 style="color:var(--accent); margin-bottom:14px;">Вход</h3>
        <div id="loginForm">
            <input type="text" id="loginNick" placeholder="Никнейм" style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.7); color:var(--text);">
            <input type="password" id="loginPass" placeholder="Пароль" style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.7); color:var(--text);">
            <button class="btn" onclick="login()">Войти</button>
            <button class="btn danger" onclick="showRegister()" style="margin-top:6px;">Регистрация</button>
        </div>
        <div id="registerForm" style="display:none;">
            <input type="text" id="regName" placeholder="Имя" style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.7); color:var(--text);">
            <input type="text" id="regNick" placeholder="Никнейм" style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.7); color:var(--text);">
            <input type="password" id="regPass" placeholder="Пароль" style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.7); color:var(--text);">
            <button class="btn" onclick="register()">Зарегистрироваться</button>
            <button class="btn danger" onclick="showLogin()" style="margin-top:6px;">Назад</button>
        </div>
        <button class="btn danger" onclick="closeAuthModal()" style="margin-top:6px;">Закрыть</button>
    </div>
</div>

<script>
// Глобальный try/catch для отлова любых ошибок
window.onerror = function(msg, url, line) {
    alert('Ошибка: ' + msg + ' (строка ' + line + ')');
    return true;
};

(function() {
    // Состояние
    const S = {
        token: localStorage.getItem('krista_token'),
        user: null,
        admin: false,
        activeChat: null,
        chats: [],
        messages: [],
        ws: null,
        createType: 'chat'
    };

    // API хелпер
    async function api(url, opts = {}) {
        const headers = { 'Content-Type': 'application/json', ...opts.headers };
        if (S.token) headers['Authorization'] = 'Bearer ' + S.token;
        const res = await fetch(url, { ...opts, headers });
        if (res.status === 401 && S.user) { logout(); throw new Error('Unauthorized'); }
        if (!res.ok) throw new Error((await res.json().catch(()=>{})).error || 'Ошибка');
        return res;
    }

    // Переключение экранов
    window.showScreen = function(screen) {
        ['chats','chat','settings','create'].forEach(s => {
            const el = document.getElementById('screen-' + s);
            if (el) el.style.display = s === screen ? 'flex' : 'none';
        });
        if (screen === 'chat') {
            const inp = document.getElementById('msgInput');
            const btn = document.getElementById('sendBtn');
            if (inp) inp.disabled = !S.user;
            if (btn) btn.disabled = !S.user;
            document.getElementById('chatGuestBanner').style.display = S.user ? 'none' : 'block';
        }
        if (screen === 'settings') loadSettings();
    };

    // Загрузка чатов
    async function loadChats() {
        try {
            const res = await api('/api/chats');
            S.chats = await res.json();
            renderChatList();
        } catch(e) { console.error(e); }
    }

    // Популярные каналы
    async function loadPopular() {
        try {
            const res = await fetch('/api/popular-channels');
            let list = await res.json();
            list = list.filter(c => c.name !== 'Каталог' && c.name !== 'Общий');
            const html = list.map(c => 
                `<div class="popular-item" onclick="openChat('${c._id}')">📢 ${esc(c.name)} <small>${c.subscribers.length}</small></div>`
            ).join('');
            document.getElementById('popularList').innerHTML = html || '<small>Нет каналов</small>';
        } catch(e) {}
    }

    function renderChatList() {
        const html = S.chats.map(c => `
            <div class="chat-item ${c._id === S.activeChat ? 'active' : ''}" onclick="openChat('${c._id}')">
                <div class="avatar">${c.name[0]}</div>
                <div class="info">
                    <div class="name">${c.name} ${c.isChannel ? '📢' : ''}</div>
                    ${c.nick ? `<div class="nick">@${c.nick}</div>` : ''}
                </div>
            </div>
        `).join('');
        document.getElementById('chatList').innerHTML = html || '<p style="padding:20px;text-align:center;">Нет чатов</p>';
    }

    window.openChat = async function(id) {
        S.activeChat = id;
        const chat = S.chats.find(c => c._id === id);
        if (chat) {
            document.getElementById('chatTitle').textContent = chat.name;
            document.getElementById('subCount').textContent = chat.subscribers.length + ' подписчиков';
        }
        try {
            const res = await api(`/api/messages/${id}?limit=50`);
            const data = await res.json();
            S.messages = data.messages;
            renderMessages();
        } catch(e) {}
        showScreen('chat');
    };

    function renderMessages() {
        const c = document.getElementById('msgContainer');
        c.innerHTML = '';
        let lastDate = '';
        S.messages.forEach(m => {
            const d = new Date(m.timestamp);
            const ds = d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'2-digit' });
            if (ds !== lastDate) {
                lastDate = ds;
                c.innerHTML += `<div class="date-sep">====== ${ds} ======</div>`;
            }
            const time = d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
            const sender = m.sender;
            c.innerHTML += `<div class="msg">
                <span class="time">[${time}]</span>
                <span class="nick" style="color:${sender?.color || '#ccc'}">${sender?.nickname || 'Система'}:</span>
                ${esc(m.text)}
            </div>`;
        });
        c.scrollTop = c.scrollHeight;
    }

    window.sendMsg = function() {
        if (!S.user || !S.activeChat) return;
        const inp = document.getElementById('msgInput');
        const text = inp.value.trim();
        if (!text) return;
        if (S.ws && S.ws.readyState === WebSocket.OPEN) {
            S.ws.send(JSON.stringify({ type: 'message', chatId: S.activeChat, text }));
            inp.value = '';
        }
    };

    // Настройки
    function loadSettings() {
        const div = document.getElementById('settingsContent');
        if (!S.user) {
            div.innerHTML = '<p>Войдите для доступа к настройкам.</p>';
            return;
        }
        div.innerHTML = `
            <input type="text" id="setName" value="${S.user.name}" style="width:100%; padding:10px; margin-bottom:8px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.6); color:var(--text);">
            <input type="text" id="setNick" value="${S.user.nickname}" style="width:100%; padding:10px; margin-bottom:8px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.6); color:var(--text);">
            <label>Цвет: <input type="color" id="setColor" value="${S.user.color}"></label>
            <button class="btn" onclick="saveProfile()">Сохранить</button>
            <input type="password" id="adminPwd" placeholder="Мастер-пароль" style="width:100%; padding:10px; margin-top:10px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.6); color:var(--text);">
            <button class="btn" onclick="activateAdmin()">Активировать мастер-доступ</button>
            <button class="btn danger" onclick="logout()">Выйти</button>
            <button class="btn danger" onclick="deleteAccount()">Удалить аккаунт</button>
        `;
    }

    window.saveProfile = async function() {
        const name = document.getElementById('setName').value;
        const nick = document.getElementById('setNick').value;
        const color = document.getElementById('setColor').value;
        await api('/api/user/me', { method: 'PUT', body: JSON.stringify({ name, nickname: nick, color }) });
        S.user = await (await api('/api/user/me')).json();
        alert('Сохранено');
    };

    window.activateAdmin = async function() {
        const pwd = document.getElementById('adminPwd').value;
        try {
            const res = await api('/api/admin/activate', { method: 'POST', body: JSON.stringify({ adminPassword: pwd }) });
            const data = await res.json();
            S.token = data.token;
            localStorage.setItem('krista_token', S.token);
            S.admin = true;
            alert('Мастер-доступ активирован');
            connectWS();
        } catch(e) { alert('Неверный пароль'); }
    };

    // Авторизация
    window.openAuthModal = () => document.getElementById('authModal').style.display = 'flex';
    window.closeAuthModal = () => document.getElementById('authModal').style.display = 'none';
    window.showRegister = () => {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
    };
    window.showLogin = () => {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
    };

    window.login = async function() {
        const nick = document.getElementById('loginNick').value;
        const pass = document.getElementById('loginPass').value;
        try {
            const res = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ nickname: nick, password: pass }) });
            const data = await res.json();
            S.token = data.token; S.user = data.user;
            localStorage.setItem('krista_token', S.token);
            closeAuthModal();
            connectWS();
            updateUI();
            showScreen('chats');
        } catch(e) { alert(e.message); }
    };

    window.register = async function() {
        const name = document.getElementById('regName').value;
        const nick = document.getElementById('regNick').value;
        const pass = document.getElementById('regPass').value;
        try {
            const res = await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ name, nickname: nick, password: pass }) });
            const data = await res.json();
            S.token = data.token; S.user = data.user;
            localStorage.setItem('krista_token', S.token);
            closeAuthModal();
            connectWS();
            updateUI();
            showScreen('chats');
        } catch(e) { alert(e.message); }
    };

    window.logout = function() {
        if (S.ws) S.ws.close();
        localStorage.removeItem('krista_token');
        S.token = null; S.user = null; S.admin = false;
        showScreen('chats');
        updateUI();
    };

    window.deleteAccount = async function() {
        if (!confirm('Удалить аккаунт?')) return;
        await api('/api/user/me', { method: 'DELETE' });
        logout();
    };

    // Создание чата
    window.setCreateType = function(t) {
        S.createType = t;
        document.getElementById('typeChatBtn').style.background = t === 'chat' ? 'var(--accent)' : 'transparent';
        document.getElementById('typeChannelBtn').style.background = t === 'channel' ? 'var(--accent)' : 'transparent';
    };

    window.createChat = async function() {
        const name = document.getElementById('createName').value.trim();
        const nick = document.getElementById('createNick').value.trim();
        if (!name) return;
        await api('/api/chat', { method: 'POST', body: JSON.stringify({ name, nick, isChannel: S.createType === 'channel' }) });
        showScreen('chats');
        loadChats();
    };

    // Поиск
    window.filterChats = function(q) {
        document.querySelectorAll('#chatList .chat-item').forEach(el => {
            const name = el.querySelector('.name')?.textContent.toLowerCase() || '';
            el.style.display = name.includes(q.toLowerCase()) ? '' : 'none';
        });
    };

    // WebSocket
    function connectWS() {
        if (S.ws) S.ws.close();
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        S.ws = new WebSocket(`${proto}://${location.host}`);
        S.ws.onopen = () => { if (S.token) S.ws.send(JSON.stringify({ type: 'auth', token: S.token })); };
        S.ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.type === 'newMessage' && d.message.chatId === S.activeChat) {
                S.messages.push(d.message);
                renderMessages();
            }
        };
        S.ws.onclose = () => { if (S.user) setTimeout(connectWS, 3000); };
    }

    function updateUI() {
        const guest = !S.user;
        document.getElementById('guestBanner').style.display = guest ? 'block' : 'none';
        const inp = document.getElementById('msgInput');
        const btn = document.getElementById('sendBtn');
        if (inp) inp.disabled = guest;
        if (btn) btn.disabled = guest;
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // Инициализация
    async function init() {
        showScreen('chats');
        if (S.token) {
            try {
                S.user = await (await api('/api/user/me')).json();
                if (S.user) connectWS();
                else { localStorage.removeItem('krista_token'); S.token = null; }
            } catch(e) { localStorage.removeItem('krista_token'); S.token = null; }
        }
        await loadChats();
        await loadPopular();
        updateUI();
    }

    init().catch(e => console.error(e));
})();
</script>
</body>
        </html>
