<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krista v1.0</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --text: #cccccc;
            --text-secondary: #888888;
            --accent: #00cc66;
            --danger: #ff3333;
            --border: #2a2a2a;
            --sidebar-width: 280px;
            --font: 'Segoe UI', system-ui, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #app {
            width: 1000px;
            height: 90vh;
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #1e1e1e;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .sidebar-header input:focus { border-color: var(--accent); }
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }
        .chat-item:hover { background: #1a1a1a; }
        .chat-item.active {
            background: #1a2a1a;
            border-left: 3px solid var(--accent);
        }
        .chat-item .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #333;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: var(--accent); flex-shrink: 0;
        }
        .chat-item .info { flex: 1; min-width: 0; }
        .chat-item .name { font-weight: 600; color: var(--text); }
        .chat-item .preview {
            font-size: 13px; color: var(--text-secondary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .chat-item .delete-chat-btn {
            display: none;
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 16px;
        }
        .chat-item.admin .delete-chat-btn { display: block; }
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .sidebar-footer button {
            flex: 1 1 auto;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.2s;
        }
        .sidebar-footer button:hover { background: #1e1e1e; }
        .sidebar-footer button.accent { border-color: var(--accent); color: var(--accent); }
        .sidebar-footer button.danger { border-color: var(--danger); color: var(--danger); }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .main-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .message {
            margin-bottom: 6px;
            word-break: break-word;
        }
        .message .time { color: var(--text-secondary); }
        .message .nick { font-weight: bold; }
        .message .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            margin-left: 8px;
            font-size: 12px;
            display: none;
        }
        .message.admin .delete-btn { display: inline; }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #1e1e1e;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }
        .input-area input:focus { border-color: var(--accent); }
        .input-area button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #000;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            transition: opacity 0.2s;
        }
        .input-area button:hover { opacity: 0.9; }
        .guest-banner {
            background: #1a1a1a;
            color: var(--text-secondary);
            text-align: center;
            padding: 12px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none;
            justify-content: center; align-items: center; z-index: 200;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .modal-content h3 { color: var(--accent); margin-bottom: 20px; }
        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #1e1e1e;
            color: var(--text);
            font-size: 15px;
            outline: none;
            margin-bottom: 16px;
        }
        .modal-content button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #000;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            margin-top: 8px;
        }
        .modal-content button.danger { background: var(--danger); }
        .modal-content .row { display: flex; gap: 8px; }
        .modal-content .row button { flex: 1; }
    </style>
</head>
<body>
<div id="app">
    <!-- Боковая панель -->
    <div class="sidebar">
        <div class="sidebar-header">
            <input type="text" placeholder="Поиск..." id="searchInput" oninput="handleSearch(this.value)">
        </div>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            <button class="accent" onclick="openCreateModal()">+ Создать</button>
            <button onclick="openAdminModal()" id="adminBtn" style="display:none;">🔑</button>
            <button onclick="openSettingsModal()" id="settingsBtn">⚙️</button>
            <button class="danger" onclick="logout()" id="logoutBtn" style="display:none;">Выйти</button>
        </div>
    </div>

    <!-- Основная область -->
    <div class="main" id="mainArea">
        <div class="guest-banner" id="guestBanner" onclick="openAuthModal()">Вы гость. Нажмите, чтобы войти или зарегистрироваться.</div>
        <div class="main-header">
            <span id="chatTitle">Общий чат</span>
            <span id="subscriberCount" style="color:var(--text-secondary); font-size:14px;"></span>
        </div>
        <div class="messages" id="messagesContainer"></div>
        <div class="input-area">
            <input type="text" placeholder="Сообщение..." id="messageInput" disabled>
            <button id="sendBtn" disabled>Отправить</button>
        </div>
    </div>
</div>

<!-- Модальные окна -->
<div class="modal" id="createModal">
    <div class="modal-content">
        <h3>Создать</h3>
        <div class="row" style="margin-bottom:16px;">
            <button id="chatTypeBtn" class="accent" onclick="setCreateType('chat')">Чат</button>
            <button id="channelTypeBtn" onclick="setCreateType('channel')">Канал</button>
        </div>
        <input type="text" id="createName" placeholder="Название">
        <input type="text" id="createNick" placeholder="Никнейм">
        <button onclick="createChat()">Создать</button>
        <button class="danger" onclick="closeModal('createModal')">Отмена</button>
    </div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <h3>Мастер-доступ</h3>
        <input type="password" id="adminPassword" placeholder="Пароль администратора">
        <button onclick="activateAdmin()">Активировать</button>
        <button class="danger" onclick="closeModal('adminModal')">Отмена</button>
    </div>
</div>

<div class="modal" id="authModal">
    <div class="modal-content">
        <h3>Вход</h3>
        <div id="loginForm">
            <input type="text" id="loginNick" placeholder="Никнейм">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <button class="danger" onclick="showRegister()">Регистрация</button>
        </div>
        <div id="registerForm" style="display:none;">
            <input type="text" id="regName" placeholder="Имя">
            <input type="text" id="regNick" placeholder="Никнейм">
            <input type="password" id="regPass" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
            <button class="danger" onclick="showLogin()">Назад</button>
        </div>
        <button class="danger" onclick="closeModal('authModal')">Закрыть</button>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3>Настройки</h3>
        <div id="settingsContent"></div>
        <button class="danger" onclick="closeModal('settingsModal')">Закрыть</button>
    </div>
</div>

<script>
// ── Состояние ──
const state = {
    token: localStorage.getItem('krista_token') || null,
    currentUser: null,
    isAdmin: false,
    activeChatId: null,
    chats: [],
    messages: [],
    ws: null,
    createType: 'chat'
};

// API helper
async function api(url, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
    const res = await fetch(url, { ...options, headers });
    if (res.status === 401 && !state.currentUser) {
        // токен истёк или невалиден, разлогиниваем
        logout();
        throw new Error('Unauthorized');
    }
    if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Ошибка' }));
        throw new Error(err.error || 'Ошибка');
    }
    return res;
}

// ── Инициализация ──
async function init() {
    if (state.token) {
        try {
            const res = await api('/api/user/me');
            state.currentUser = await res.json();
            if (state.currentUser) {
                // проверим, админ ли токен (просто посмотрим на наличие isAdmin в JWT, но мы можем не парсить, а положиться на сервер)
                // пока просто считаем, что если залогинены, то не админ (админ активируется отдельно)
                state.isAdmin = false;
                connectWebSocket();
            } else {
                // токен был, но пользователь не найден
                localStorage.removeItem('krista_token');
                state.token = null;
            }
        } catch (e) {
            localStorage.removeItem('krista_token');
            state.token = null;
        }
    }
    // загружаем чаты (гостю тоже доступны публичные)
    await loadChats();
    renderUI();
}

function connectWebSocket() {
    if (state.ws) state.ws.close();
    const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
    state.ws = new WebSocket(`${protocol}://${location.host}`);
    state.ws.onopen = () => {
        if (state.token) state.ws.send(JSON.stringify({ type: 'auth', token: state.token }));
    };
    state.ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'newMessage') {
            if (data.message.chatId === state.activeChatId) {
                state.messages.push(data.message);
                renderMessages();
            }
        } else if (data.type === 'messageDeleted') {
            state.messages = state.messages.filter(m => m._id !== data.messageId);
            renderMessages();
        } else if (data.type === 'chatDeleted') {
            if (state.activeChatId === data.chatId) {
                state.activeChatId = state.chats.find(c => c._id !== data.chatId)?._id || null;
                if (state.activeChatId) selectChat(state.activeChatId);
                else state.activeChatId = null;
            }
            loadChats();
        }
    };
    state.ws.onclose = () => {
        if (state.currentUser) setTimeout(connectWebSocket, 3000);
    };
}

// ── Загрузка чатов ──
async function loadChats() {
    try {
        const res = await api('/api/chats', { skipError: true });
        state.chats = await res.json();
        if (state.chats.length > 0 && !state.activeChatId) {
            state.activeChatId = state.chats[0]._id;
        }
        renderChatList();
    } catch (e) {
        console.error('Ошибка загрузки чатов:', e);
    }
}

function renderChatList() {
    const container = document.getElementById('chatList');
    container.innerHTML = state.chats.map(chat => `
        <div class="chat-item ${chat._id === state.activeChatId ? 'active' : ''} ${state.isAdmin ? 'admin' : ''}" 
             onclick="selectChat('${chat._id}')">
            <div class="avatar">${chat.name.charAt(0)}</div>
            <div class="info">
                <div class="name">${chat.name} ${chat.isChannel ? '📢' : ''}</div>
                <div class="preview">${chat.subscribers.length} участников</div>
            </div>
            ${state.isAdmin ? `<button class="delete-chat-btn" onclick="event.stopPropagation(); deleteChat('${chat._id}')">❌</button>` : ''}
        </div>
    `).join('');
}

// ── Выбор чата ──
function selectChat(chatId) {
    state.activeChatId = chatId;
    renderChatList();
    loadMessages();
    const chat = state.chats.find(c => c._id === chatId);
    if (chat) {
        document.getElementById('chatTitle').textContent = chat.name;
        document.getElementById('subscriberCount').textContent = `${chat.subscribers.length} подписчиков`;
    }
}

async function loadMessages() {
    if (!state.activeChatId) return;
    try {
        const res = await api(`/api/messages/${state.activeChatId}?limit=50`);
        const data = await res.json();
        state.messages = data.messages;
        renderMessages();
    } catch (e) {
        console.error('Ошибка загрузки сообщений:', e);
    }
}

function renderMessages() {
    const container = document.getElementById('messagesContainer');
    container.innerHTML = state.messages.map(msg => {
        const sender = msg.sender;
        const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
        return `
            <div class="message ${state.isAdmin ? 'admin' : ''}">
                <span class="time">[${time}]</span>
                <span class="nick" style="color:${sender?.color || '#ccc'};">${sender?.nickname || 'Удалён'}:</span>
                ${escapeHtml(msg.text)}
                ${state.isAdmin ? `<button class="delete-btn" onclick="deleteMessage('${msg._id}')">❌</button>` : ''}
            </div>
        `;
    }).join('');
    container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ── Отправка сообщения ──
function sendMessage() {
    if (!state.currentUser || !state.activeChatId) return;
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;
    if (state.ws && state.ws.readyState === WebSocket.OPEN) {
        state.ws.send(JSON.stringify({ type: 'message', chatId: state.activeChatId, text }));
        input.value = '';
    } else {
        alert('Нет соединения с сервером');
    }
}

// ── Удаление сообщения (админ) ──
function deleteMessage(messageId) {
    if (!state.isAdmin) return;
    if (state.ws && state.ws.readyState === WebSocket.OPEN) {
        state.ws.send(JSON.stringify({ type: 'deleteMessage', messageId }));
    }
}

// ── Удаление чата (админ) ──
function deleteChat(chatId) {
    if (!state.isAdmin) return;
    if (confirm('Удалить чат навсегда?')) {
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
            state.ws.send(JSON.stringify({ type: 'deleteChat', chatId }));
        }
    }
}

// ── Административный доступ ──
function openAdminModal() { document.getElementById('adminModal').classList.add('active'); }
async function activateAdmin() {
    const password = document.getElementById('adminPassword').value;
    try {
        const res = await api('/api/admin/activate', {
            method: 'POST',
            body: JSON.stringify({ adminPassword: password })
        });
        const data = await res.json();
        state.token = data.token;
        localStorage.setItem('krista_token', state.token);
        state.isAdmin = true;
        closeModal('adminModal');
        renderChatList();
        renderMessages();
        alert('Мастер-доступ активирован на 30 минут.');
    } catch (e) {
        alert('Неверный пароль администратора');
    }
}

// ── Создание чата/канала ──
function openCreateModal() { document.getElementById('createModal').classList.add('active'); }
function setCreateType(type) {
    state.createType = type;
    document.getElementById('chatTypeBtn').className = type === 'chat' ? 'accent' : '';
    document.getElementById('channelTypeBtn').className = type === 'channel' ? 'accent' : '';
}
async function createChat() {
    const name = document.getElementById('createName').value.trim();
    const nick = document.getElementById('createNick').value.trim();
    if (!name) return alert('Введите название');
    try {
        await api('/api/chat', {
            method: 'POST',
            body: JSON.stringify({ name, nick, isChannel: state.createType === 'channel' })
        });
        closeModal('createModal');
        await loadChats();
    } catch (e) {
        alert(e.message);
    }
}

// ── Настройки (профиль) ──
function openSettingsModal() {
    const content = document.getElementById('settingsContent');
    if (!state.currentUser) {
        content.innerHTML = '<p>Войдите для доступа к настройкам.</p>';
    } else {
        content.innerHTML = `
            <input type="text" id="setName" placeholder="Имя" value="${state.currentUser.name}">
            <input type="text" id="setNickname" placeholder="Никнейм" value="${state.currentUser.nickname}">
            <input type="color" id="setColor" value="${state.currentUser.color}">
            <button onclick="saveSettings()">Сохранить</button>
            <button class="danger" onclick="deleteAccount()">Удалить аккаунт</button>
        `;
    }
    document.getElementById('settingsModal').classList.add('active');
}

async function saveSettings() {
    const name = document.getElementById('setName').value.trim();
    const nickname = document.getElementById('setNickname').value.trim();
    const color = document.getElementById('setColor').value;
    try {
        await api('/api/user/me', {
            method: 'PUT',
            body: JSON.stringify({ name, nickname, color })
        });
        state.currentUser = await (await api('/api/user/me')).json();
        closeModal('settingsModal');
    } catch (e) {
        alert(e.message);
    }
}

async function deleteAccount() {
    if (confirm('Удалить аккаунт безвозвратно?')) {
        await api('/api/user/me', { method: 'DELETE' });
        logout();
    }
}

// ── Авторизация ──
function openAuthModal() { document.getElementById('authModal').classList.add('active'); }
function showRegister() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
}
function showLogin() {
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
}
async function login() {
    const nickname = document.getElementById('loginNick').value.trim();
    const password = document.getElementById('loginPass').value;
    try {
        const res = await api('/api/auth/login', {
            method: 'POST',
            body: JSON.stringify({ nickname, password })
        });
        const data = await res.json();
        state.token = data.token;
        state.currentUser = data.user;
        localStorage.setItem('krista_token', state.token);
        closeModal('authModal');
        connectWebSocket();
        loadChats();
        renderUI();
    } catch (e) {
        alert(e.message);
    }
}
async function register() {
    const name = document.getElementById('regName').value.trim();
    const nickname = document.getElementById('regNick').value.trim();
    const password = document.getElementById('regPass').value;
    try {
        const res = await api('/api/auth/register', {
            method: 'POST',
            body: JSON.stringify({ name, nickname, password })
        });
        const data = await res.json();
        state.token = data.token;
        state.currentUser = data.user;
        localStorage.setItem('krista_token', state.token);
        closeModal('authModal');
        connectWebSocket();
        loadChats();
        renderUI();
    } catch (e) {
        alert(e.message);
    }
}
function logout() {
    if (state.ws) state.ws.close();
    localStorage.removeItem('krista_token');
    state.token = null;
    state.currentUser = null;
    state.isAdmin = false;
    state.activeChatId = state.chats.length > 0 ? state.chats[0]._id : null;
    loadChats();
    renderUI();
}

// ── Поиск (простой фильтр по имени) ──
function handleSearch(query) {
    const items = document.querySelectorAll('.chat-item');
    items.forEach(item => {
        const name = item.querySelector('.name').textContent.toLowerCase();
        item.style.display = name.includes(query.toLowerCase()) ? '' : 'none';
    });
}

// ── Обновление интерфейса ──
function renderUI() {
    const guest = !state.currentUser;
    document.getElementById('guestBanner').style.display = guest ? 'block' : 'none';
    document.getElementById('messageInput').disabled = guest;
    document.getElementById('sendBtn').disabled = guest;
    document.getElementById('logoutBtn').style.display = guest ? 'none' : 'inline-flex';
    document.getElementById('adminBtn').style.display = guest ? 'none' : 'inline-flex';
    document.getElementById('settingsBtn').style.display = 'inline-flex';
    if (guest) {
        document.getElementById('chatTitle').textContent = 'Общий чат';
        document.getElementById('subscriberCount').textContent = '';
    }
}

// ── Закрытие модалок ──
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ── Запуск ──
init();

// Обработчики Enter
document.getElementById('messageInput').addEventListener('keypress', (e) => {
