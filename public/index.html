<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>К. Мессенджер 0.21</title>
    <style>
        :root {
            --bg: rgba(10, 10, 10, 0.35);
            --surface: rgba(20, 20, 20, 0.45);
            --text: #cccccc;
            --text-secondary: #888888;
            --accent: #00cc66;
            --danger: #ff3333;
            --border: rgba(42, 42, 42, 0.5);
            --font: 'Segoe UI', system-ui, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background-color: #000;
            background-image: url('https://cdn.kibrispdr.org/data/9/background-aesthetic-purple-17.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
            margin: 0;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        #app {
            width: 390px;
            max-width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0,0,0,0.7);
            transition: width 0.3s ease, height 0.3s ease;
        }
        .header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex-shrink: 0;
        }
        .header .logo { font-weight: 700; font-size: 17px; color: var(--accent); }
        .back-btn {
            background: none; border: none; color: var(--accent); font-size: 18px; margin-right: 8px; cursor: pointer;
        }
        .search-bar { padding: 8px 18px; border-bottom: 1px solid var(--border); }
        .search-bar input {
            width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border);
            background: rgba(30,30,30,0.5); color: var(--text); font-size: 13px; outline: none;
        }
        .popular-channels { padding: 10px 18px; border-bottom: 1px solid var(--border); }
        .popular-channels h4 { font-size: 12px; color: var(--accent); margin-bottom: 6px; }
        .popular-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 8px; margin-bottom: 3px; cursor: pointer; font-size: 13px;
            border: 1px solid rgba(0,204,102,0.25); border-radius: 6px;
            background: rgba(0,204,102,0.04); transition: 0.2s;
        }
        .popular-item:hover { border-color: var(--accent); }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 10px 18px; cursor: pointer; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; transition: background 0.2s; position: relative;
        }
        .chat-item:hover { background: rgba(255,255,255,0.03); }
        .chat-item.active { background: rgba(0,204,102,0.08); border-left: 3px solid var(--accent); }
        .chat-item .avatar {
            width: 32px; height: 32px; border-radius: 50%; background: #333;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            color: var(--accent); flex-shrink: 0; font-size: 14px;
        }
        .chat-item .info { flex: 1; min-width: 0; }
        .chat-item .name { font-weight: 600; color: var(--text); font-size: 14px; }
        .chat-item .nick { font-size: 11px; color: var(--text-secondary); }
        .sidebar-footer {
            border-top: 1px solid var(--border); display: flex; gap: 6px; padding: 10px 18px;
        }
        .sidebar-footer button {
            flex: 1; padding: 8px 6px; border-radius: 6px; border: 1px solid var(--border);
            background: transparent; color: var(--text); cursor: pointer; font-weight: 600; font-size: 11px;
        }
        .sidebar-footer button.accent { border-color: var(--accent); color: var(--accent); }
        .messages { flex: 1; overflow-y: auto; padding: 16px 18px; font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.5; }
        .date-separator { color: var(--text-secondary); text-align: center; margin: 16px 0 8px; font-size: 13px; font-weight: bold; }
        .message { margin-bottom: 4px; word-break: break-word; position: relative; }
        .message .time { color: var(--text-secondary); }
        .message .nick { font-weight: bold; }
        .delete-btn { background: none; border: none; color: var(--danger); cursor: pointer; margin-left: 6px; font-size: 13px; }
        .input-area { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; gap: 10px; backdrop-filter: blur(5px); }
        .input-area input { flex: 1; padding: 9px 12px; border-radius: 6px; border: 1px solid var(--border); background: rgba(30,30,30,0.6); color: var(--text); font-size: 13px; }
        .input-area button { padding: 8px 16px; border-radius: 6px; border: none; background: var(--accent); color: #000; font-weight: 700; cursor: pointer; font-size: 13px; }
        .guest-banner { background: rgba(26,26,26,0.6); color: var(--text-secondary); text-align: center; padding: 8px; font-size: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .settings-content, .create-content { padding: 20px; overflow-y: auto; }
        .btn {
            padding: 12px 18px; border-radius: 6px; border: none; background: var(--accent); color: #000;
            font-weight: 700; cursor: pointer; margin: 8px 0; width: 100%;
        }
        .btn.danger { background: var(--danger); }
        .btn.small { width: auto; padding: 8px 14px; font-size: 12px; display: inline-block; }
        .settings-info { text-align: center; color: var(--text-secondary); font-size: 11px; margin-top: 16px; }
    </style>
</head>
<body>
<div id="app">
    <!-- Представление: список чатов (главный экран) -->
    <div id="view-chats" style="display:none; flex-direction: column; height: 100%;">
        <div class="header">
            <span class="logo">К. Мессенджер</span>
            <div></div>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Поиск..." id="searchInput" oninput="handleSearch(this.value)">
        </div>
        <div class="popular-channels" id="popularChannels">
            <h4>🔥 Популярные каналы</h4>
            <div id="popularList"></div>
        </div>
        <div class="chat-list" id="chatList"></div>
        <div class="guest-banner" id="guestBanner" onclick="openAuthModal()" style="display:none;">Вы гость. Чтобы писать, войдите или зарегистрируйтесь.</div>
        <div class="sidebar-footer">
            <button class="accent" onclick="showView('create')">✏️ Создать</button>
            <button onclick="showView('settings')">⚙️ Настройки</button>
        </div>
    </div>

    <!-- Представление: чат -->
    <div id="view-chat" style="display:none; flex-direction: column; height: 100%;">
        <div class="header">
            <button class="back-btn" onclick="showView('chats')">← Назад</button>
            <span id="chatTitle"></span>
            <span id="subscriberCount" style="color:var(--text-secondary); font-size:13px;"></span>
        </div>
        <div class="guest-banner" id="chatGuestBanner" onclick="openAuthModal()" style="display:none;">Вы гость. Чтобы писать, войдите или зарегистрируйтесь.</div>
        <div class="messages" id="messagesContainer"></div>
        <div class="input-area">
            <input type="text" placeholder="Сообщение..." id="messageInput" disabled>
            <button id="sendBtn" disabled onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <!-- Представление: настройки -->
    <div id="view-settings" style="display:none; flex-direction: column; height: 100%;">
        <div class="header">
            <button class="back-btn" onclick="showView('chats')">← Назад</button>
            <span>Настройки</span>
            <div></div>
        </div>
        <div class="settings-content" id="settingsContent"></div>
        <div class="settings-info">
            Версия 0.21 | 26 мая 2026<br>Студия ЛесГем Ком и Кiль Com.
        </div>
    </div>

    <!-- Представление: создание -->
    <div id="view-create" style="display:none; flex-direction: column; height: 100%;">
        <div class="header">
            <button class="back-btn" onclick="showView('chats')">← Назад</button>
            <span>Создать</span>
            <div></div>
        </div>
        <div class="create-content" id="createContent"></div>
    </div>
</div>

<!-- Модальное окно входа/регистрации -->
<div id="authModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:200;">
    <div style="background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; padding: 22px; width: 360px;">
        <h3 style="color:var(--accent); margin-bottom:14px;">Вход</h3>
        <div id="loginForm">
            <input type="text" id="loginNick" placeholder="Никнейм" style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:rgba(30,30,30,0.7); color:var(--text); margin-bottom:12px;">
            <input type="password" id="loginPass" placeholder="Пароль" style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:rgba(30,30,30,0.7); color:var(--text); margin-bottom:12px;">
            <button class="btn" onclick="login()">Войти</button>
            <button class="btn danger" onclick="showRegister()" style="margin-top:6px;">Регистрация</button>
        </div>
        <div id="registerForm" style="display:none;">
            <input type="text" id="regName" placeholder="Имя" style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:rgba(30,30,30,0.7); color:var(--text); margin-bottom:12px;">
            <input type="text" id="regNick" placeholder="Никнейм" style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:rgba(30,30,30,0.7); color:var(--text); margin-bottom:12px;">
            <input type="password" id="regPass" placeholder="Пароль" style="width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:rgba(30,30,30,0.7); color:var(--text); margin-bottom:12px;">
            <button class="btn" onclick="register()">Зарегистрироваться</button>
            <button class="btn danger" onclick="showLogin()" style="margin-top:6px;">Назад</button>
        </div>
        <button class="btn danger" onclick="closeAuthModal()" style="margin-top:6px;">Закрыть</button>
    </div>
</div>

<script>
(function() {
    // Глобальное состояние
    const state = {
        token: localStorage.getItem('krista_token') || null,
        currentUser: null,
        isAdmin: false,
        activeChatId: null,
        chats: [],
        messages: [],
        ws: null,
        enterSends: true
    };

    // Утилита для API-запросов
    async function api(url, options = {}) {
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
        const res = await fetch(url, { ...options, headers });
        if (res.status === 401 && state.currentUser) { logout(); throw new Error('Unauthorized'); }
        if (!res.ok) {
            const err = await res.json().catch(() => ({ error: 'Ошибка' }));
            throw new Error(err.error || 'Ошибка');
        }
        return res;
    }

    // Безопасное переключение представлений (не падает, если элемент не найден)
    function showView(view) {
        const views = ['chats', 'chat', 'settings', 'create'];
        views.forEach(v => {
            const el = document.getElementById('view-' + v);
            if (el) el.style.display = v === view ? 'flex' : 'none';
        });

        if (view === 'chat') {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            if (input) input.disabled = !state.currentUser;
            if (btn) btn.disabled = !state.currentUser;
            const banner = document.getElementById('chatGuestBanner');
            if (banner) banner.style.display = state.currentUser ? 'none' : 'block';
        }

        if (view === 'settings') renderSettings();
        if (view === 'create') renderCreate();
    }

    // Инициализация приложения
    async function init() {
        // Сразу показываем главный экран
        showView('chats');

        if (state.token) {
            try {
                const res = await api('/api/user/me');
                state.currentUser = await res.json();
                if (state.currentUser) {
                    connectWebSocket();
                } else {
                    localStorage.removeItem('krista_token');
                    state.token = null;
                }
            } catch (e) {
                localStorage.removeItem('krista_token');
                state.token = null;
            }
        }

        try {
            await loadChats();
            await loadPopular();
        } catch (e) {
            console.error('Ошибка загрузки данных:', e);
        }

        renderUI();
    }

    function connectWebSocket() {
        if (state.ws) state.ws.close();
        const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
        state.ws = new WebSocket(`${protocol}://${location.host}`);
        state.ws.onopen = () => { if (state.token) state.ws.send(JSON.stringify({ type: 'auth', token: state.token })); };
        state.ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.type === 'newMessage' && d.message.chatId === state.activeChatId) {
                state.messages.push(d.message);
                renderMessages();
            } else if (d.type === 'chatDeleted') {
                state.chats = state.chats.filter(c => c._id !== d.chatId);
                if (state.activeChatId === d.chatId) {
                    state.activeChatId = null;
                    showView('chats');
                }
                renderChatList();
            }
        };
        state.ws.onclose = () => { if (state.currentUser) setTimeout(connectWebSocket, 3000); };
    }

    async function loadChats() {
        const res = await api('/api/chats');
        state.chats = await res.json();
        renderChatList();
    }

    async function loadPopular() {
        try {
            const res = await fetch('/api/popular-channels');
            if (!res.ok) return;
            let popular = await res.json();
            popular = popular.filter(c => c.name !== 'Каталог' && c.name !== 'Общий');
            const container = document.getElementById('popularList');
            if (container) {
                container.innerHTML = popular.map(c => `
                    <div class="popular-item" onclick="openChat('${c._id}')">
                        📢 ${escapeHtml(c.name)} <span class="subs">${c.subscribers.length}</span>
                    </div>
                `).join('');
            }
        } catch (e) {
            console.error('Popular channels error:', e);
        }
    }

    function renderChatList() {
        const container = document.getElementById('chatList');
        if (!container) return;
        container.innerHTML = state.chats.map(chat => `
            <div class="chat-item ${chat._id === state.activeChatId ? 'active' : ''}" onclick="openChat('${chat._id}')">
                <div class="avatar">${chat.name.charAt(0)}</div>
                <div class="info">
                    <div class="name">${chat.name} ${chat.isChannel ? '📢' : ''}</div>
                    ${chat.nick ? `<div class="nick">@${chat.nick}</div>` : ''}
                </div>
            </div>
        `).join('');
    }

    function openChat(chatId) {
        state.activeChatId = chatId;
        const chat = state.chats.find(c => c._id === chatId);
        if (chat) {
            const titleEl = document.getElementById('chatTitle');
            if (titleEl) titleEl.innerHTML = `${chat.name} ${chat.nick ? `<span style="font-size:13px;color:var(--text-secondary);">@${chat.nick}</span>` : ''}`;
            const subEl = document.getElementById('subscriberCount');
            if (subEl) subEl.textContent = `${chat.subscribers.length} подписчиков`;
        }
        loadMessages();
        showView('chat');
    }

    async function loadMessages() {
        if (!state.activeChatId) return;
        try {
            const res = await api(`/api/messages/${state.activeChatId}?limit=50`);
            const data = await res.json();
            state.messages = data.messages;
            renderMessages();
        } catch (e) {
            console.error('Load messages error:', e);
        }
    }

    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        container.innerHTML = '';
        let lastDate = '';
        state.messages.forEach(msg => {
            const d = new Date(msg.timestamp);
            const dateStr = d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'2-digit' });
            if (dateStr !== lastDate) {
                lastDate = dateStr;
                const sep = document.createElement('div');
                sep.className = 'date-separator';
                sep.textContent = `====== ${dateStr} ======`;
                container.appendChild(sep);
            }
            const line = document.createElement('div');
            line.className = 'message' + (state.isAdmin ? ' admin' : '');
            const sender = msg.sender;
            const time = d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
            if (sender) {
                line.innerHTML = `<span class="time">[${time}]</span> <span class="nick" style="color:${sender.color || '#ccc'}">${sender.nickname}:</span> ${escapeHtml(msg.text)}`;
            } else {
                line.innerHTML = `<span>${escapeHtml(msg.text)}</span>`;
            }
            if (state.isAdmin && sender) {
                const btn = document.createElement('button');
                btn.className = 'delete-btn';
                btn.textContent = '❌';
                btn.onclick = () => deleteMessage(msg._id);
                line.appendChild(btn);
            }
            container.appendChild(line);
        });
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        if (!input) return;
        const text = input.value.trim();
        if (!text) return;
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
            state.ws.send(JSON.stringify({ type: 'message', chatId: state.activeChatId, text }));
            input.value = '';
        } else {
            alert('Нет соединения с сервером');
        }
    }

    function renderSettings() {
        const container = document.getElementById('settingsContent');
        if (!container) return;
        if (!state.currentUser) {
            container.innerHTML = '<p>Войдите для доступа к настройкам.</p>';
            return;
        }
        container.innerHTML = `
            <input type="text" id="setName" placeholder="Имя" value="${state.currentUser.name}" style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.6); color:var(--text); margin-bottom:8px;">
            <input type="text" id="setNickname" placeholder="Никнейм" value="${state.currentUser.nickname}" style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.6); color:var(--text); margin-bottom:8px;">
            <div style="margin:10px 0"><label>Цвет ника: <input type="color" id="setColor" value="${state.currentUser.color}"></label></div>
            <div style="margin:10px 0">
                <label>Ширина окна: <span id="widthValue">${parseInt(document.getElementById('app').style.width) || 390}</span>px</label>
                <div style="display:flex; gap:6px; margin-top:4px;"><button onclick="changeWidth(-30)">−</button><button onclick="changeWidth(30)">+</button></div>
            </div>
            <div style="margin:10px 0">
                <label>Высота окна: <span id="heightValue">${parseInt(document.getElementById('app').style.height) || window.innerHeight}px</span></label>
                <div style="display:flex; gap:6px; margin-top:4px;"><button onclick="changeHeight(-30)">−</button><button onclick="changeHeight(30)">+</button></div>
            </div>
            <label><input type="checkbox" id="enterSendsCheckbox" ${state.enterSends ? 'checked' : ''} onchange="state.enterSends = this.checked"> Enter отправляет сообщение</label>
            <button class="btn" onclick="saveSettings()" style="margin-top:10px;">Сохранить</button>
            <div style="margin:10px 0"><input type="password" id="adminPassword" placeholder="Пароль мастер-доступа" style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.6); color:var(--text);"><button class="btn" onclick="activateAdmin()">Активировать</button></div>
            <button class="btn danger" onclick="logout()">Выйти</button>
            <button class="btn danger" onclick="deleteAccount()">Удалить аккаунт</button>
        `;
    }

    window.changeWidth = function(delta) {
        const app = document.getElementById('app');
        let w = parseInt(app.style.width) || 390;
        w = Math.max(320, Math.min(600, w + delta));
        app.style.width = w + 'px';
        const span = document.getElementById('widthValue');
        if (span) span.textContent = w;
        localStorage.setItem('krista_appWidth', w);
    };

    window.changeHeight = function(delta) {
        const app = document.getElementById('app');
        let h = parseInt(app.style.height) || window.innerHeight;
        h = Math.max(480, Math.min(900, h + delta));
        app.style.height = h + 'px';
        const span = document.getElementById('heightValue');
        if (span) span.textContent = h;
        localStorage.setItem('krista_appHeight', h);
    };

    async function saveSettings() {
        const name = document.getElementById('setName').value;
        const nickname = document.getElementById('setNickname').value;
        const color = document.getElementById('setColor').value;
        try {
            await api('/api/user/me', { method: 'PUT', body: JSON.stringify({ name, nickname, color }) });
            state.currentUser = await (await api('/api/user/me')).json();
            alert('Сохранено');
        } catch (e) {
            alert('Ошибка сохранения: ' + e.message);
        }
    }

    function renderCreate() {
        const container = document.getElementById('createContent');
        if (!container) return;
        container.innerHTML = `
            <h3>Создать</h3>
            <div style="display:flex; gap:8px; margin-bottom:12px;">
                <button id="chatTypeBtn" class="btn small" style="background:var(--accent); color:#000;" onclick="setCreateType('chat')">Чат</button>
                <button id="channelTypeBtn" class="btn small" onclick="setCreateType('channel')">Канал</button>
            </div>
            <input type="text" id="createName" placeholder="Название" style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.6); color:var(--text); margin-bottom:8px;">
            <input type="text" id="createNick" placeholder="Никнейм" style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border); background:rgba(30,30,30,0.6); color:var(--text); margin-bottom:8px;">
            <button class="btn" onclick="createChat()">Создать</button>
        `;
        window._createType = 'chat';
    }

    window.setCreateType = function(type) {
        window._createType = type;
        const chatBtn = document.getElementById('chatTypeBtn');
        const channelBtn = document.getElementById('channelTypeBtn');
        if (chatBtn) chatBtn.style.background = type === 'chat' ? 'var(--accent)' : 'transparent';
        if (channelBtn) channelBtn.style.background = type === 'channel' ? 'var(--accent)' : 'transparent';
    };

    async function createChat() {
        const name = document.getElementById('createName').value.trim();
        const nick = document.getElementById('createNick').value.trim();
        if (!name) return alert('Введите название');
        try {
            await api('/api/chat', { method: 'POST', body: JSON.stringify({ name, nick, isChannel: window._createType === 'channel' }) });
            showView('chats');
            await loadChats();
        } catch (e) {
            alert('Ошибка: ' + e.message);
        }
    }

    function handleSearch(query) {
        const items = document.querySelectorAll('#chatList .chat-item');
        items.forEach(item => {
            const name = item.querySelector('.name')?.textContent.toLowerCase() || '';
            item.style.display = name.includes(query.toLowerCase()) ? '' : 'none';
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Авторизация
    window.openAuthModal = function() { document.getElementById('authModal').style.display = 'flex'; };
    window.closeAuthModal = function() { document.getElementById('authModal').style.display = 'none'; };
    window.showRegister = function() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
    };
    window.showLogin = function() {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
    };

    async function login() {
        const nick = document.getElementById('loginNick').value.trim();
        const pass = document.getElementById('loginPass').value;
        if (!nick || !pass) return alert('Заполните поля');
        try {
            const res = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ nickname: nick, password: pass }) });
            const data = await res.json();
            state.token = data.token;
            state.currentUser = data.user;
            localStorage.setItem('krista_token', state.token);
            connectWebSocket();
            closeAuthModal();
            renderUI();
            showView('chats');
        } catch (e) {
            alert('Ошибка входа: ' + e.message);
        }
    }

    async function register() {
        const name = document.getElementById('regName').value.trim();
        const nick = document.getElementById('regNick').value.trim();
        const pass = document.getElementById('regPass').value;
        if (!name || !nick || !pass) return alert('Заполните все поля');
        try {
            const res = await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ name, nickname: nick, password: pass }) });
            const data = await res.json();
            state.token = data.token;
            state.currentUser = data.user;
            localStorage.setItem('krista_token', state.token);
            connectWebSocket();
            closeAuthModal();
            renderUI();
            showView('chats');
        } catch (e) {
            alert('Ошибка регистрации: ' + e.message);
        }
    }

    function logout() {
        if (state.ws) state.ws.close();
        localStorage.removeItem('krista_token');
        state.token = null;
        state.currentUser = null;
        state.isAdmin = false;
        showView('chats');
        renderUI();
    }

    async function deleteAccount() {
        if (!confirm('Удалить аккаунт безвозвратно?')) return;
        try {
            await api('/api/user/me', { method: 'DELETE' });
            logout();
        } catch (e) {
            alert('Ошибка удаления: ' + e.message);
        }
    }

    async function activateAdmin() {
        const pwd = document.getElementById('adminPassword').value;
        if (!pwd) return alert('Введите пароль');
        try {
            const res = await api('/api/admin/activate', { method: 'POST', body: JSON.stringify({ adminPassword: pwd }) });
            const data = await res.json();
            state.token = data.token;
            localStorage.setItem('krista_token', state.token);
            state.isAdmin = true;
            alert('Мастер-доступ активирован на 30 минут');
            connectWebSocket();
        } catch (e) {
            alert('Неверный пароль');
        }
    }

    function deleteMessage(id) {
        if (!state.isAdmin) return;
        if (state.ws && state.ws.readyState === WebSocket.OPEN) {
            state.ws.send(JSON.stringify({ type: 'deleteMessage', messageId: id }));
        }
    }

    function renderUI() {
        const guest = !state.currentUser;
        const banner = document.getElementById('guestBanner');
        if (banner) banner.style.display = guest ? 'block' : 'none';
    }

    // Применяем сохранённые размеры окна
    const savedWidth = localStorage.getItem('krista_appWidth');
    if (savedWidth) document.getElementById('app').style.width = savedWidth + 'px';
    const savedHeight = localStorage.getItem('krista_appHeight');
    if (savedHeight) document.getElementById('app').style.height = savedHeight + 'px';

    // Экспортируем функции в глобальную область для onclick
    window.showView = showView;
    window.openChat = openChat;
    window.sendMessage = sendMessage;
    window.handleSearch = handleSearch;
    window.createChat = createChat;
    window.saveSettings = saveSettings;
    window.login = login;
    window.register = register;
    window.logout = logout;
    window.deleteAccount = deleteAccount;
    window.activateAdmin = activateAdmin;
    window.deleteMessage = deleteMessage;

    // Запуск после полной загрузки DOM
    document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
